<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bangkhen Baptist Church</title>
<link rel="icon" href="logo.png">

<style>

/* ================= HARD RESET (กันล้น 100%) ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden !important;
}

/* กัน browser แอบขยาย */
body {
  background: #eef2f7;
  font-family: sans-serif;
}

/* ================= IMAGE SAFE ================= */
img {
  max-width: 100%;
  height: auto;
  display: block;
}

/* ================= NAV ================= */
.navbar {
  width: 100%;
  background: #0a2c6d;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  flex-wrap: wrap;
}

/* ================= HERO (FIX ลึกระดับ pixel overflow) ================= */
.hero {
  position: relative;
  width: 100%;
  height: 45svh;
  min-height: 220px;
  max-height: 360px;
  overflow: hidden;
}

/* 🔥 สำคัญ: inset 0 กัน overflow pixel */
.slide {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1s ease;
}

.slide.active {
  opacity: 1;
}

/* ================= INFO ================= */
.info {
  width: 100%;
  background: white;
  padding: 20px;
  text-align: center;
  line-height: 1.6;
}

/* ================= MAIN ================= */
.main-section {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 15px;
  padding: 15px;
}

/* 🔥 FIX สำคัญที่สุดสำหรับ grid overflow */
.left, .right {
  min-width: 0; /* 💥 กันล้นจริง */
  background: white;
  padding: 15px;
  border-radius: 12px;
}

/* ================= POST ================= */
.post {
  width: 100%;
  min-width: 0;
  background: #fff;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  word-break: break-word;
}

/* ================= DASHBOARD ================= */
.dashboard {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  min-width: 0;
  background: #dbe7f5;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
}

/* ================= FORM ================= */
.container {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.box {
  min-width: 0;
  background: #dbe7f5;
  padding: 12px;
  border-radius: 12px;
}

/* ================= INPUT ================= */
input, textarea {
  width: 100%;
  max-width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* ================= BUTTON ================= */
button {
  width: 100%;
  padding: 10px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 8px;
}

/* ================= ROW ================= */
.row {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

/* ================= FOOTER ================= */
footer {
  width: 100%;
  background: #0a2c6d;
  color: white;
  text-align: center;
  padding: 20px;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

  .hero {
    height: 30vh;
  }

  .main-section,
  .dashboard,
  .container,
  .row {
    grid-template-columns: 1fr;
  }
}

/* ================= FINAL SAFETY NET ================= */
body {
  overflow-x: hidden;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="logo.png" style="width:35px;border-radius:50%;">
    Bangkhen Baptist Church
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="slide active" style="background-image:url('hero_01.png')"></div>
  <div class="slide" style="background-image:url('hero_02.png')"></div>
  <div class="slide" style="background-image:url('hero_03.png')"></div>
  <div class="slide" style="background-image:url('hero_04.png')"></div>
</div>

<!-- INFO -->
<div class="info">
  <h2>ยินดีต้อนรับ คริสตจักรแบ๊บติสต์บางเขน</h2>
  <p>เวลา นมัสการ 9.00 - 12.00</p>
</div>

<!-- MAIN -->
<div class="main-section">

  <div class="left">
    <h2>📰 ข่าวสาร</h2>
    <div id="news"></div>
  </div>

  <div class="right">
    <h2>📚 บทความ</h2>
    <div id="articles"></div>
  </div>

</div>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card">ผู้ลงทะเบียน</div>
  <div class="card">นมัสการ</div>
  <div class="card">ศึกษา</div>
</div>

<!-- FORM -->
<div class="container">

  <div class="box">
    <h3>ติดต่อ</h3>
    <input placeholder="ชื่อ">
    <input placeholder="เบอร์">
    <textarea placeholder="ที่อยู่"></textarea>
    <button>ส่งข้อมูล</button>
  </div>

  <div class="box">
    <h3>LINE</h3>
    <img src="line-qr.png">
  </div>

</div>

<!-- FOOTER -->
<footer>
  <img src="logo.png" width="60"><br>
  Bangkhen Baptist Church
</footer>

</body>
</html>
