<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC Church - Admin Center (Modern Black)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4dabff; --bg-black: #000000; --card-bg: #111111; --success: #27ae60; --danger: #e74c3c; }
        body { background: var(--bg-black); color: #ffffff; font-family: 'Sarabun', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .admin-card { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        h2 { font-family: 'Prompt'; color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: inline-block; }
        input, textarea, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 10px; }
        .btn-save { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* Card Layout */
        .article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 15px; }
        .article-card { background: #1a1a1a; border-radius: 12px; padding: 15px; border: 1px solid #333; }
        .card-title { font-size: 17px; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .card-meta { font-size: 13px; color: #ccc; }
        .yt-preview { width: 100%; height: 150px; background: #000; border-radius: 8px; margin-top: 10px; }
        .card-actions { margin-top: 15px; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-card">
        <h2>✍️ บันทึกบทความ</h2>
        <form id="articleForm">
            <input type="hidden" id="editId">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="date" id="customDate" required>
                <select id="category">
                    <option value="🎙️ คำเทศนา">🎙️ คำเทศนา</option>
                    <option value="🌟 คำพยาน">🌟 คำพยาน</option>
                    <option value="📖 บทความ">📖 บทความ</option>
                    <option value="📢 ข่าวสาร">📢 ข่าวสาร</option>
                </select>
            </div>
            <input type="text" id="title" placeholder="หัวข้อเรื่อง" required>
            <input type="text" id="yt1" placeholder="ลิงก์ YouTube 1">
            <textarea id="mainContent" rows="4" placeholder="เนื้อหา..."></textarea>
            <button type="submit" class="btn-save">🚀 บันทึกข้อมูล</button>
        </form>
    </div>

    <div class="admin-card">
        <h2>📑 รายการเนื้อหา</h2>
        <div id="articleContainer"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
        projectId: "bbcchurch-6ffc3",
        storageBucket: "bbcchurch-6ffc3.firebasestorage.app",
        appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
    }));

    function getYoutubeId(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(reg);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    onSnapshot(collection(db, "articles"), (snap) => {
        const container = document.getElementById("articleContainer");
        container.innerHTML = "";
        
        let list = [];
        snap.forEach(d => list.push({id: d.id, ...d.data()}));
        list.sort((a, b) => new Date(b.displayDate) - new Date(a.displayDate));

        const groups = list.reduce((acc, item) => {
            (acc[item.category] = acc[item.category] || []).push(item);
            return acc;
        }, {});

        Object.keys(groups).forEach(cat => {
            container.innerHTML += `<h3 style="color:var(--primary); margin-top:30px;">${cat}</h3>`;
            const grid = document.createElement("div");
            grid.className = "article-grid";
            groups[cat].forEach(item => {
                const vid = item.yt1 ? getYoutubeId(item.yt1) : null;
                grid.innerHTML += `
                    <div class="article-card">
                        <div class="card-title">${item.title}</div>
                        <div class="card-meta">📅 ${item.displayDate}</div>
                        ${vid ? `<iframe class="yt-preview" src="https://www.youtube.com/embed/${vid}"></iframe>` : ""}
                        <div class="card-actions">
                            <button onclick="editArt('${item.id}')" style="flex:1; padding:8px; border:none; background:#4dabff; border-radius:5px; font-weight:bold;">แก้ไข</button>
                            <button onclick="deleteArt('${item.id}')" style="flex:1; padding:8px; border:none; background:#e74c3c; color:white; border-radius:5px; font-weight:bold;">ลบ</button>
                        </div>
                    </div>`;
            });
            container.appendChild(grid);
        });
    });

    document.getElementById("articleForm").onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById("editId").value;
        const data = {
            displayDate: document.getElementById("customDate").value,
            category: document.getElementById("category").value,
            title: document.getElementById("title").value,
            yt1: document.getElementById("yt1").value,
            mainContent: document.getElementById("mainContent").value
        };
        if (id) await updateDoc(doc(db, "articles", id), data);
        else await addDoc(collection(db, "articles"), { ...data, createdAt: serverTimestamp() });
        window.location.reload();
    };

    window.editArt = async (id) => {
        const d = (await getDoc(doc(db, "articles", id))).data();
        document.getElementById("editId").value = id;
        document.getElementById("title").value = d.title;
        document.getElementById("customDate").value = d.displayDate;
        document.getElementById("category").value = d.category;
        document.getElementById("yt1").value = d.yt1 || "";
        document.getElementById("mainContent").value = d.mainContent;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.deleteArt = async (id) => { if (confirm("ยืนยันการลบ?")) await deleteDoc(doc(db, "articles", id)); };
</script>
</body>
</html>
