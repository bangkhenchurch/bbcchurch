<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>BBC Church Admin Center</title>
    <style>
        :root { --bg: #000; --card: #151515; --text: #fff; --primary: #4dabff; --success: #27ae60; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        h2 { font-size: 18px; color: var(--primary); margin-top: 0; }
        
        /* แก้ปัญหาหน้าจอเล็ก */
        label { display: block; font-size: 13px; margin: 10px 0 5px; color: #aaa; }
        input, select, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        
        /* ปุ่มและตาราง */
        .btn-action { padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-save { background: var(--success); color: #fff; }
        .btn-plus { background: var(--primary); color: #fff; width: 50px; flex-shrink: 0; }
        .flex { display: flex; gap: 5px; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border-bottom: 1px solid #333; padding: 10px 5px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>✍️ แบบฟอร์ม บันทึกบทความ</h2>
        <form id="articleForm">
            <label>1. วันที่</label><input type="date" id="date" required>
            <label>2. หมวดหมู่</label>
            <select id="cat"><option>คำเทศนา</option><option>คำพยาน</option><option>บทความ</option><option>ข่าวสาร</option></select>
            <label>3. หัวข้อเรื่อง</label><input type="text" id="title" required>
            <label>4. ซีรีย์</label><input type="text" id="series">
            
            <label>5. ผู้เทศนา / ผู้เขียน (เลือกหรือเพิ่ม)</label>
            <div class="flex">
                <select id="authorList"></select>
                <button type="button" class="btn-plus" onclick="addAuthor()">+</button>
            </div>
            
            <label>6. ข้อพระธรรม</label><input type="text" id="bible">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>11. ลิ้งก์ YouTube 1</label><input type="text" id="yt1"></div>
                <div><label>12. ลิ้งก์ YouTube 2</label><input type="text" id="yt2"></div>
            </div>
            <label>13. ลิ้งก์อิสระ</label><input type="text" id="extraLink">
            <label>14. เนื้อหา</label><textarea id="content" rows="4"></textarea>
            <label>15. หมายเหตุ</label><input type="text" id="note">
            
            <button type="submit" class="btn-action btn-save">บันทึกข้อมูลและแสดงผลทันที</button>
        </form>
    </div>

    <div class="card">
        <h2>⭐️ อนุมัติความคิดเห็น</h2>
        <table id="commentTable">
            <thead><tr><th>บทความ</th><th>ดาว</th><th>จัดการ</th></tr></thead>
            <tbody id="commentBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = { /* ใส่ config ของคุณที่นี่ */ };
    const db = getFirestore(initializeApp(firebaseConfig));

    // เพิ่มฟังก์ชัน Add Author
    window.addAuthor = () => {
        const name = prompt("เพิ่มรายชื่อผู้เขียน/ผู้เทศนา:");
        if(name) {
            addDoc(collection(db, "authors"), { name: name });
        }
    };

    // บันทึกบทความ
    document.getElementById("articleForm").onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "articles"), {
            title: document.getElementById("title").value,
            date: document.getElementById("date").value,
            // ... เก็บค่าอื่นๆ
        });
        alert("บันทึกเรียบร้อย!");
    };
</script>
</body>
</html>
