<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BBC Church (High Speed)</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4dabff; --dark-bg: #121212; --card-bg: #1e1e1e; --accent: #0a2c6d; }
        body { background: var(--dark-bg); color: #e0e0e0; font-family: 'Sarabun', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; }
        .form-card, .list-card { background: var(--card-bg); padding: 25px; border-radius: 15px; border-top: 4px solid var(--primary); margin-bottom: 30px; }
        h2, h3 { font-family: 'Prompt'; color: white; }
        label { display: block; margin-top: 15px; color: var(--primary); font-size: 14px; font-weight: 600; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .upload-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 10px; }
        .upload-box { width: 100%; height: 120px; background: #252525; border: 2px dashed #444; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .upload-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .upload-box span { font-size: 11px; color: #888; text-align: center; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .btn-save:disabled { background: #444; opacity: 0.7; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h2 id="form-title">✍️ เขียนบทความ (Fast Upload)</h2>
        <form id="postForm">
            <input type="hidden" id="editId">
            <label>หัวข้อเรื่อง</label>
            <input type="text" id="title" required>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" id="author" placeholder="ผู้แต่ง">
                <input type="date" id="customDate" required>
            </div>

            <label>หมวดหมู่</label>
            <select id="category">
                <option value="📢 ข่าวสารคริสตจักร">📢 ข่าวสารคริสตจักร</option>
                <option value="📖 บทความทั่วไป">📖 บทความทั่วไป</option>
                <option value="🙏 คำพยานจากผู้เชื่อ">🙏 คำพยานจากผู้เชื่อ</option>
                <option value="🎙️ คำเทศนา (วิดีโอ)">🎙️ คำเทศนา (วิดีโอ)</option>
            </select>

            <label>รูปภาพ (ส่งไฟล์ทันที)</label>
            <div class="upload-grid">
                <div class="upload-box" onclick="document.getElementById('f1').click()">
                    <span id="t1">➕ รูปปก</span>
                    <input type="file" id="f1" hidden onchange="quickPreview(this, 't1')">
                </div>
                <div class="upload-box" onclick="document.getElementById('f2').click()">
                    <span id="t2">➕ รูปหัวบทความ</span>
                    <input type="file" id="f2" hidden onchange="quickPreview(this, 't2')">
                </div>
                <div class="upload-box" onclick="document.getElementById('f3').click()">
                    <span id="t3">➕ รูปประกอบ</span>
                    <input type="file" id="f3" hidden onchange="quickPreview(this, 't3')">
                </div>
            </div>

            <label>เนื้อหา</label>
            <textarea id="content" rows="8"></textarea>
            
            <div id="status" style="text-align:center; color:var(--primary); margin-top:10px;"></div>
            <button type="submit" id="saveBtn" class="btn-save">🚀 บันทึกและเผยแพร่</button>
        </form>
    </div>

    <div class="list-card">
        <h3>📋 รายการทั้งหมด</h3>
        <table id="articleTable">
            <thead><tr><th>วันที่</th><th>หัวข้อ</th><th>จัดการ</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
        authDomain: "bbcchurch-6ffc3.firebaseapp.com",
        projectId: "bbcchurch-6ffc3",
        storageBucket: "bbcchurch-6ffc3.appspot.com",
        appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    document.getElementById('customDate').valueAsDate = new Date();

    // แสดงพรีวิวทันที ไม่บีบอัด
    window.quickPreview = (input, textId) => {
        if (input.files[0]) {
            document.getElementById(textId).innerText = "✅ เลือกแล้ว: " + input.files[0].name;
            document.getElementById(textId).style.color = "#4dabff";
        }
    };

    async function uploadFile(file) {
        if (!file) return null;
        const sRef = ref(storage, `uploads/${Date.now()}_${file.name}`);
        const snap = await uploadBytes(sRef, file);
        return await getDownloadURL(snap.ref);
    }

    document.getElementById('postForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        const st = document.getElementById('status');
        btn.disabled = true;
        st.innerText = "⚡ กำลังส่งข้อมูลแบบด่วน...";

        try {
            // อัพโหลดพร้อมกัน 3 รูป (Parallel) เพื่อความเร็วสูงสุด
            const [u1, u2, u3] = await Promise.all([
                uploadFile(document.getElementById('f1').files[0]),
                uploadFile(document.getElementById('f2').files[0]),
                uploadFile(document.getElementById('f3').files[0])
            ]);

            const data = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value || 'คริสตจักร',
                category: document.getElementById('category').value,
                displayDate: document.getElementById('customDate').value,
                content: document.getElementById('content').value,
                updatedAt: serverTimestamp()
            };

            if (u1) data.thumbUrl = u1;
            if (u2) data.introUrl = u2;
            if (u3) data.contentUrl = u3;

            const id = document.getElementById('editId').value;
            if (id) {
                await updateDoc(doc(db, "articles", id), data);
            } else {
                data.createdAt = serverTimestamp();
                await addDoc(collection(db, "articles"), data);
            }
            alert("บันทึกสำเร็จ!");
            location.reload();
        } catch (err) {
            alert("Error: " + err.message);
            btn.disabled = false;
        }
    };

    onSnapshot(query(collection(db, "articles"), orderBy("displayDate", "desc")), (snap) => {
        const tbody = document.querySelector("#articleTable tbody");
        tbody.innerHTML = "";
        snap.forEach(d => {
            const r = d.data();
            tbody.innerHTML += `
                <tr>
                    <td>${r.displayDate}</td>
                    <td>${r.title}</td>
                    <td>
                        <button onclick="editPost('${d.id}')" style="color:yellow; background:none; border:none; cursor:pointer;">แก้ไข</button>
                        <button onclick="deletePost('${d.id}')" style="color:red; background:none; border:none; cursor:pointer; margin-left:10px;">ลบ</button>
                    </td>
                </tr>`;
        });
    });

    window.deletePost = async (id) => { if(confirm('ลบหรือไม่?')) await deleteDoc(doc(db, "articles", id)); };
    
    window.editPost = (id) => {
        // สำหรับแก้ไข แนะนำให้ใช้การดึงข้อมูลจากหน้าจอเดิม หรือหาข้อมูลจาก snapshot
        alert("กำลังเข้าสู่โหมดแก้ไข (ID: " + id + ")");
        document.getElementById('editId').value = id;
        window.scrollTo(0,0);
    };
</script>
</body>
</html>
