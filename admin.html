<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBC Church - Admin Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4dabff; 
            --bg-black: #000; 
            --card-bg: #111; 
            --success: #27ae60; 
            --danger: #e74c3c; 
            --warning: #f39c12;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-black); color: #fff; font-family: 'Sarabun', sans-serif; padding: 15px; }
        .container { max-width: 1200px; margin: auto; width: 100%; }
        .admin-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; }
        h2 { color: var(--primary); font-family: 'Prompt'; font-size: 20px; border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 20px; }
        .form-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 15px; }
        label { font-size: 14px; color: #ccc; display: block; margin-bottom: 5px; font-family: 'Prompt'; }
        input, select, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; font-size: 15px; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; }
        
        .btn-mini { background: var(--primary); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: 'Prompt'; }
        .btn-mini.edit { background: var(--warning); color: #000; font-weight: bold; }
        .btn-mini.del { background: var(--danger); }
        
        .btn-save { width: 100%; padding: 15px; background: var(--success); border: none; color: white; border-radius: 10px; font-weight: bold; font-size: 16px; font-family: 'Prompt'; cursor: pointer; transition: 0.2s; }
        .btn-save:hover { opacity: 0.9; }
        .btn-cancel { width: 100%; padding: 10px; background: #444; border: none; color: white; border-radius: 8px; font-family: 'Prompt'; margin-top: 10px; cursor: pointer; display: none; }

        /* การจัดกลุ่มหมวดหมู่ */
        .category-block { margin-top: 25px; border-top: 1px dashed #333; padding-top: 20px; }
        .category-title { font-family: 'Prompt'; font-size: 18px; color: var(--accent-yellow, #ffcc00); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .article-card { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
        .card-img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: #222; }
        .card-title { font-weight: bold; font-size: 16px; margin-bottom: 8px; color: #fff; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta-info { font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .card-actions { display: flex; gap: 8px; margin-top: 12px; border-top: 1px solid #2a2a2a; padding-top: 10px; }
        
        .file-info-text { font-size: 11px; color: #888; margin-top: 3px; display: block; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-card">
        <h2 id="formTitle">✍️ บันทึกบทความใหม่</h2>
        <form id="articleForm">
            <input type="hidden" id="editId">
            <div class="form-section">
                <div><label>วันที่เผยแพร่</label><input type="date" id="customDate" required></div>
                <div><label>หมวดหมู่</label>
                    <select id="category">
                        <option value="🎙️ คำเทศนา">🎙️ คำเทศนา</option>
                        <option value="🌟 คำพยาน">🌟 คำพยาน</option>
                        <option value="📖 บทความ">📖 บทความ</option>
                        <option value="📢 ข่าวสาร">📢 ข่าวสาร</option>
                    </select>
                </div>
                <div><label>ซีรีย์</label><input type="text" id="series" placeholder="เช่น มัทธิว, ก้าวสู่ชีวิตใหม่"></div>
                <div><label>หัวข้อเรื่อง</label><input type="text" id="title" required placeholder="ระบุชื่อเรื่อง"></div>
                <div><label>ข้อพระธรรมอ้างอิง</label><input type="text" id="bibleRef" placeholder="เช่น ยอห์น 3:16"></div>
                <div><label>ผู้แต่ง / ผู้เทศนา</label>
                    <div style="display:flex; gap:5px;">
                        <select id="authorSelect"></select>
                        <button type="button" class="btn-mini" onclick="addAuthor()">+</button>
                        <button type="button" class="btn-mini del" onclick="removeAuthor()">🗑️</button>
                    </div>
                </div>
                <div>
                    <label>รูปปกนำ (Thumbnail)</label>
                    <input type="file" id="fileThumb" accept="image/*">
                    <span id="txtThumb" class="file-info-text"></span>
                </div>
                <div>
                    <label>รูปเนื้อหา 1 (Arc 1)</label>
                    <input type="file" id="filePic1" accept="image/*">
                    <span id="txtPic1" class="file-info-text"></span>
                </div>
                <div>
                    <label>รูปเนื้อหา 2 (Arc 2)</label>
                    <input type="file" id="filePic2" accept="image/*">
                    <span id="txtPic2" class="file-info-text"></span>
                </div>
                <div><label>ลิงก์ YouTube 1</label><input type="text" id="yt1" placeholder="https://www.youtube.com/watch?v=..."></div>
                <div><label>ลิงก์ YouTube 2</label><input type="text" id="yt2" placeholder="https://..."></div>
            </div>
            <div>
                <label>เนื้อหาบทความแบบเต็ม</label>
                <textarea id="mainContent" rows="6" placeholder="พิมพ์เนื้อหาที่นี่..."></textarea>
            </div>
            
            <button type="submit" id="btnSubmit" class="btn-save" style="margin-top:20px;">🚀 บันทึกข้อมูล</button>
            <button type="button" id="btnCancelEdit" class="btn-cancel" onclick="cancelEditMode()">❌ ยกเลิกการแก้ไข</button>
        </form>
    </div>

    <div class="admin-card">
        <h2>📑 รายการเนื้อหาทั้งหมด (เรียงตามวันที่ล่าสุด)</h2>
        <div id="categoryContainer">
            <p style="color: #666; font-size: 14px;">กำลังโหลดรายการบทความ...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, deleteDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
        projectId: "bbcchurch-6ffc3",
        storageBucket: "bbcchurch-6ffc3.firebasestorage.app",
        appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
    }));
    const storage = getStorage();

    // เก็บ URL เก่าเวลาจะเซฟอัปเดตเคสไม่ได้อัปโหลดไฟล์ใหม่
    let currentThumbUrl = "";
    let currentPic1Url = "";
    let currentPic2Url = "";

    // ระบบจัดการผู้แต่งผ่าน LocalStorage
    const updateAuthorDropdown = () => {
        const authors = JSON.parse(localStorage.getItem('authors') || '["ศิษยาภิบาล", "ทีมงาน BBC"]');
        const select = document.getElementById('authorSelect');
        select.innerHTML = authors.map(a => `<option value="${a}">${a}</option>`).join('');
    };

    window.addAuthor = () => {
        const name = prompt("เพิ่มชื่อผู้แต่ง:");
        if (name && name.trim() !== "") {
            const authors = JSON.parse(localStorage.getItem('authors') || '["ศิษยาภิบาล", "ทีมงาน BBC"]');
            authors.push(name.trim());
            localStorage.setItem('authors', JSON.stringify(authors));
            updateAuthorDropdown();
        }
    };

    window.removeAuthor = () => {
        const select = document.getElementById('authorSelect');
        if (!select.value) return;
        if (confirm(`ยืนยันการลบชื่อ "${select.value}"?`)) {
            let authors = JSON.parse(localStorage.getItem('authors') || '["ศิษยาภิบาล", "ทีมงาน BBC"]');
            authors = authors.filter(a => a !== select.value);
            localStorage.setItem('authors', JSON.stringify(authors));
            updateAuthorDropdown();
        }
    };
    updateAuthorDropdown();

    // ระบบอัปโหลดไฟล์ไปที่ Firebase Storage
    async function uploadFile(file) {
        if (!file) return null;
        const res = await uploadBytesResumable(ref(storage, 'arts/' + Date.now() + '_' + file.name), file);
        return await getDownloadURL(res.ref);
    }

    // ฟังก์ชันยกเลิกโหมดแก้ไข กลับเป็นโหมดเพิ่มใหม่
    window.cancelEditMode = () => {
        document.getElementById("editId").value = "";
        document.getElementById("articleForm").reset();
        document.getElementById("formTitle").innerText = "✍️ บันทึกบทความใหม่";
        document.getElementById("btnSubmit").innerText = "🚀 บันทึกข้อมูล";
        document.getElementById("btnCancelEdit").style.display = "none";
        
        currentThumbUrl = "";
        currentPic1Url = "";
        currentPic2Url = "";
        document.getElementById("txtThumb").innerText = "";
        document.getElementById("txtPic1").innerText = "";
        document.getElementById("txtPic2").innerText = "";
    };

    // บันทึกฟอร์ม (รองรับทั้ง Add และ Edit)
    document.getElementById("articleForm").onsubmit = async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById("btnSubmit");
        const originalText = submitBtn.innerText;
        submitBtn.disabled = true;
        submitBtn.innerText = "⏳ กำลังบันทึกข้อมูล กรุณารอซักครู่...";

        const editId = document.getElementById("editId").value;

        // ตรวจเช็คไฟล์ใหม่ ถ้าไม่มีให้ใช้ค่า URL เดิมที่มีอยู่แล้ว
        const fileThumb = document.getElementById("fileThumb").files[0];
        const filePic1 = document.getElementById("filePic1").files[0];
        const filePic2 = document.getElementById("filePic2").files[0];

        const finalThumbUrl = fileThumb ? await uploadFile(fileThumb) : currentThumbUrl;
        const finalPic1Url = filePic1 ? await uploadFile(filePic1) : currentPic1Url;
        const finalPic2Url = filePic2 ? await uploadFile(filePic2) : currentPic2Url;

        const data = {
            displayDate: document.getElementById("customDate").value,
            series: document.getElementById("series").value || "",
            category: document.getElementById("category").value,
            bibleRef: document.getElementById("bibleRef").value || "",
            title: document.getElementById("title").value,
            authorName: document.getElementById("authorSelect").value,
            yt1: document.getElementById("yt1").value || "",
            yt2: document.getElementById("yt2").value || "",
            mainContent: document.getElementById("mainContent").value || "",
            thumbUrl: finalThumbUrl,
            arc1: finalPic1Url, // แมปเข้าตัวแปรโค้ดอ่านเดิม arc1
            arc2: finalPic2Url  // แมปเข้าตัวแปรโค้ดอ่านเดิม arc2
        };

        try {
            if (editId) {
                // โหมดแก้ไขอัปเดตข้อมูลเดิม
                await updateDoc(doc(db, "articles", editId), data);
                alert("แก้ไขข้อมูลบทความสำเร็จ!");
            } else {
                // โหมดเพิ่มใหม่ข้อมูลใหม่
                await addDoc(collection(db, "articles"), data);
                alert("บันทึกบทความใหม่สำเร็จ!");
            }
            cancelEditMode();
        } catch (error) {
            console.error("Error saving documentation: ", error);
            alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = originalText;
        }
    };

    // โหลดฐานข้อมูลแบบ Realtime + จัดเรียงหมวดหมู่และวันที่ล่าสุด (เรียงจาก String Date)
    let allArticles = [];
    onSnapshot(collection(db, "articles"), (snap) => {
        allArticles = [];
        snap.forEach(d => {
            allArticles.push({ id: d.id, ...d.data() });
        });

        // 1. จัดเรียงวันที่จาก "ล่าสุดขึ้นก่อน" (เรียงจากมากไปน้อยตามข้อความสัญกรณ์ YYYY-MM-DD)
        allArticles.sort((a, b) => {
            const dateA = a.displayDate || "0000-00-00";
            const dateB = b.displayDate || "0000-00-00";
            return dateB.localeCompare(dateA);
        });

        // 2. จัดกลุ่มแยกตามหมวดหมู่หลัก
        const categories = ["🎙️ คำเทศนา", "🌟 คำพยาน", "📖 บทความ", "📢 ข่าวสาร"];
        const container = document.getElementById("categoryContainer");
        container.innerHTML = "";

        categories.forEach(cat => {
            const filtered = allArticles.filter(item => item.category === cat);
            
            if (filtered.length > 0) {
                let catBlockHtml = `
                    <div class="category-block">
                        <div class="category-title">${cat} (${filtered.length} รายการ)</div>
                        <div class="article-grid">
                `;

                filtered.forEach(i => {
                    catBlockHtml += `
                        <div class="article-card">
                            <div>
                                <img src="${i.thumbUrl || 'https://placehold.co/600x400/222/fff?text=No+Image'}" class="card-img">
                                <div class="card-title">${i.title}</div>
                                <div class="meta-info">📅 วันที่: ${i.displayDate || '-'}</div>
                                <div class="meta-info">📖 ข้อพระธรรม: ${i.bibleRef || '-'}</div>
                                <div class="meta-info">📁 ซีรีย์: ${i.series || '-'}</div>
                                <div class="meta-info">✍️ ผู้แต่ง: ${i.authorName || '-'}</div>
                            </div>
                            <div class="card-actions">
                                <button onclick="startEditArt('${i.id}')" class="btn-mini edit">✏️ แก้ไข</button>
                                <button onclick="deleteArt('${i.id}')" class="btn-mini del">🗑️ ลบ</button>
                            </div>
                        </div>`;
                });

                catBlockHtml += `</div></div>`;
                container.innerHTML += catBlockHtml;
            }
        });

        if(allArticles.length === 0) {
            container.innerHTML = `<p style="color:#888; text-align:center; padding: 20px;">ยังไม่มีข้อมูลบทความในระบบ</p>`;
        }
    });

    // ดึงค่าบทความมาใส่บนฟอร์มเพื่อเข้าสู่โหมดแก้ไข
    window.startEditArt = (id) => {
        const item = allArticles.find(a => a.id === id);
        if (!item) return;

        // สลับหัวข้อและสถานะฟอร์ม
        document.getElementById("formTitle").innerText = "✏️ กำลังแก้ไขบทความ: " + item.title;
        document.getElementById("btnSubmit").innerText = "💾 อัปเดตข้อมูล";
        document.getElementById("btnCancelEdit").style.display = "block";

        // ยัดค่าเก่าลงฟิลด์อินพุตต่างๆ
        document.getElementById("editId").value = item.id;
        document.getElementById("customDate").value = item.displayDate || "";
        document.getElementById("category").value = item.category || "🎙️ คำเทศนา";
        document.getElementById("series").value = item.series || "";
        document.getElementById("title").value = item.title || "";
        document.getElementById("bibleRef").value = item.bibleRef || "";
        document.getElementById("mainContent").value = item.mainContent || "";
        document.getElementById("yt1").value = item.yt1 || "";
        document.getElementById("yt2").value = item.yt2 || "";

        // เลือกค่าผู้แต่งให้ตรงในดรอปดาวน์ (ถ้าไม่มีในรายการให้เพิ่มชั่วคราว)
        const authorSelect = document.getElementById("authorSelect");
        if (![...authorSelect.options].some(opt => opt.value === item.authorName)) {
            const opt = document.createElement("option");
            opt.value = item.authorName;
            opt.text = item.authorName;
            authorSelect.add(opt);
        }
        authorSelect.value = item.authorName;

        // เก็บประวัติค่าลิ้งค์ไฟล์รูปภาพเดิมไว้ใช้หากไม่มีการอัปโหลดรูปใหม่ทับลงไป
        currentThumbUrl = item.thumbUrl || "";
        currentPic1Url = item.arc1 || item.pic1 || "";
        currentPic2Url = item.arc2 || item.pic2 || "";

        // แสดงสัญลักษณ์บอกสถานะไฟล์เดิม
        document.getElementById("txtThumb").innerText = currentThumbUrl ? "มีไฟล์รูปปกเดิมอยู่แล้ว" : "ไม่มีไฟล์รูป";
        document.getElementById("txtPic1").innerText = currentPic1Url ? "มีไฟล์รูปเนื้อหา 1 เดิมอยู่แล้ว" : "ไม่มีไฟล์รูป";
        document.getElementById("txtPic2").innerText = currentPic2Url ? "มีไฟล์รูปเนื้อหา 2 เดิมอยู่แล้ว" : "ไม่มีไฟล์รูป";

        // สกรอลล์จอมือถือกลับขึ้นมาที่ฟอร์มด้านบนสุดอัตโนมัติ
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // ลบบทความจาก Firestore
    window.deleteArt = (id) => {
        if(confirm('🚨 คุณแน่ใจใช่ไหมว่าต้องการลบบทความนี้อย่างถาวร?')) {
            deleteDoc(doc(db, "articles", id)).then(() => {
                // ป้องกันบั๊กหากลบรายการขณะที่กำลังแก้ไขตัวมันเองอยู่พอดี
                if(document.getElementById("editId").value === id) {
                    cancelEditMode();
                }
            });
        }
    };
</script>
</body>
</html>
