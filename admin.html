<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - จัดการบทความ</title>

<!-- ใส่โลโก้ที่แท็บบาร์เบราเซอร์ -->
<link rel="icon" type="image/png" href="logo.png">

<style>
body{font-family:sans-serif;background:#eef2f7;padding:20px; color:#333;}
h1{color:#0a2c6d; text-align: center; margin-bottom: 20px;}

.box{
  background:white;
  padding:20px;
  border-radius:12px;
  margin: auto;
  max-width: 600px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  margin-bottom:30px;
}

label { display: block; margin-top: 10px; font-weight: bold; color: #555; }

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  background:#2e7d32;
  color:white;
  padding:12px;
  border:none;
  border-radius:8px;
  width:100%;
  cursor:pointer;
  font-size: 16px;
  font-weight: bold;
  margin-top: 10px;
}

button:hover { background: #235d26; }

.list-container { max-width: 800px; margin: auto; }

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

img.preview-img {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  border-radius: 10px;
  margin-top: 10px;
}

.star{
  color:gold;
  font-size:20px;
  margin: 5px 0;
}

.action-btns{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.action-btns button{
  width:50%;
  padding: 8px;
  font-size: 14px;
}

.edit-btn{background:#1976d2;}
.delete-btn{background:#d32f2f;}

.nav-link {
    display: block;
    text-align: center;
    margin-bottom: 20px;
    color: #0a2c6d;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<a href="index.html" class="nav-link">← กลับหน้าหลักเว็บไซต์</a>
<h1>📝 ระบบจัดการบทความ</h1>

<div class="box">
    <form id="postForm">
        <label>หัวข้อบทความ</label>
        <input name="title" placeholder="ใส่ชื่อหัวข้อ..." required>

        <label>หมวดหมู่</label>
        <select name="category">
          <option>คำเทศนา</option>
          <option>ข่าว</option>
          <option>ข้อคิดพระคัมภีร์</option>
          <option>กิจกรรมคริสตจักร</option>
        </select>

        <label>ชื่อผู้เขียน</label>
        <input name="author" placeholder="ระบุชื่อผู้เขียน">

        <label>รูปภาพประกอบ (URL หรือเลือกไฟล์)</label>
        <input name="imageUrl" placeholder="ใส่ URL รูปภาพ หรืออัปโหลดด้านล่าง">
        <input type="file" id="imageFile" accept="image/*">

        <label>เนื้อหาบทความ</label>
        <textarea name="content" rows="6" placeholder="พิมพ์เนื้อหาบทความที่นี่..."></textarea>

        <label>ให้คะแนนบทความ (เริ่มต้น) ⭐</label>
        <select name="rating">
          <option value="5">⭐⭐⭐⭐⭐ (5 ดาว)</option>
          <option value="4">⭐⭐⭐⭐ (4 ดาว)</option>
          <option value="3">⭐⭐⭐ (3 ดาว)</option>
          <option value="2">⭐⭐ (2 ดาว)</option>
          <option value="1">⭐ (1 ดาว)</option>
        </select>

        <button type="submit" id="submitBtn">🚀 บันทึกบทความ</button>
    </form>
</div>

<div class="list-container">
    <h2 style="color:#0a2c6d; margin-bottom: 15px;">📚 รายการบทความทั้งหมด</h2>
    <div id="list">กำลังโหลด...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, serverTimestamp, getDocs, 
  query, orderBy, deleteDoc, doc, updateDoc, getDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
 authDomain: "bbcchurch-6ffc3.firebaseapp.com",
 projectId: "bbcchurch-6ffc3",
 storageBucket: "bbcchurch-6ffc3.appspot.com",
 messagingSenderId: "1007626508012",
 appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = null;

// บันทึก หรือ อัปเดตข้อมูล
document.getElementById("postForm").addEventListener("submit", async (e)=>{
  e.preventDefault();
  
  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = true;
  submitBtn.innerText = "กำลังบันทึก...";

  // จัดการรูปภาพ (ถ้ามีไฟล์ให้ใช้ไฟล์ ถ้าไม่มีให้ใช้ URL)
  const file = document.getElementById("imageFile").files[0];
  let finalImageUrl = e.target.imageUrl.value;

  if(file){
    // หมายเหตุ: ในที่นี้เป็นการสร้าง Preview URL ชั่วคราว 
    // หากต้องการใช้ถาวรต้องอัปโหลดขึ้น Firebase Storage
    finalImageUrl = URL.createObjectURL(file);
  }

  const data = {
    title: e.target.title.value,
    category: e.target.category.value,
    author: e.target.author.value || "ไม่ระบุ",
    content: e.target.content.value,
    rating: parseInt(e.target.rating.value),
    image: finalImageUrl || "https://via.placeholder.com/600x300?text=No+Image",
    createdAt: serverTimestamp()
  };

  try {
    if(editId){
      await updateDoc(doc(db, "articles", editId), data);
      alert("อัปเดตบทความสำเร็จ!");
      editId = null;
      submitBtn.innerText = "🚀 บันทึกบทความ";
    } else {
      await addDoc(collection(db, "articles"), data);
      alert("บันทึกบทความใหม่สำเร็จ!");
    }
    e.target.reset();
    load();
  } catch (error) {
    console.error(error);
    alert("เกิดข้อผิดพลาด!");
  } finally {
    submitBtn.disabled = false;
  }
});

// โหลดข้อมูลจาก Firebase
async function load(){
  const list = document.getElementById("list");
  list.innerHTML = "กำลังโหลดข้อมูล...";

  const q = query(collection(db, "articles"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);
  
  list.innerHTML = "";

  snap.forEach(d => {
    const data = d.data();
    const id = d.id;
    let stars = "⭐".repeat(data.rating || 0);
    let date = data.createdAt ? data.createdAt.toDate().toLocaleString("th-TH") : "กำลังประมวลผล...";

    list.innerHTML += `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
              <h2 style="margin:0; color:#0a2c6d;">${data.title}</h2>
              <small>${data.category} | โดย ${data.author}</small>
          </div>
          <div class="star">${stars}</div>
      </div>
      <p style="font-size:14px; color:#666; margin:10px 0;">${date}</p>
      ${data.image ? `<img src="${data.image}" class="preview-img">` : ""}
      <p style="white-space: pre-line;">${data.content.substring(0, 150)}...</p>
      
      <div class="action-btns">
        <button class="edit-btn" onclick="editPost('${id}')">✏️ แก้ไข</button>
        <button class="delete-btn" onclick="deletePost('${id}')">🗑 ลบ</button>
      </div>
    </div>
    `;
  });
}

// ลบบทความ
window.deletePost = async (id)=>{
  if(confirm("ยืนยันการลบบทความนี้?")){
    await deleteDoc(doc(db, "articles", id));
    load();
  }
};

// เตรียมข้อมูลเพื่อแก้ไข
window.editPost = async (id)=>{
  const ref = doc(db, "articles", id);
  const snap = await getDoc(ref);
  const data = snap.data();

  const form = document.getElementById("postForm");
  form.title.value = data.title;
  form.category.value = data.category;
  form.author.value = data.author;
  form.content.value = data.content;
  form.rating.value = data.rating;
  form.imageUrl.value = data.image;

  editId = id;
  document.getElementById("submitBtn").innerText = "🔄 อัปเดตบทความ";
  window.scrollTo({top: 0, behavior: 'smooth'});
};

load();
</script>

</body>
</html>
