<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC Church - Admin Center (Modern Black)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4dabff; 
            --bg-black: #000000; 
            --card-bg: #111111; 
            --input-bg: #1a1a1a;
            --border: #333333;
            --text-main: #ffffff;
            --text-dim: #bbbbbb;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        * { box-sizing: border-box; }
        body { 
            background: var(--bg-black); 
            color: var(--text-main); 
            font-family: 'Sarabun', sans-serif; 
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: auto; }
        
        /* Form Styling */
        .admin-card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 15px; 
            border: 1px solid var(--border);
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        h2 { 
            font-family: 'Prompt'; 
            color: var(--primary); 
            margin-top: 0;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            display: inline-block;
        }

        .form-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .full-width { grid-column: 1 / -1; }

        label { 
            display: block; 
            font-size: 14px; 
            margin-bottom: 8px; 
            color: var(--primary);
            font-weight: 600;
        }

        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            color: white; 
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; }

        /* Author Selector */
        .author-group { display: flex; gap: 10px; }
        .btn-mini { 
            background: var(--primary); 
            border: none; color: white; 
            padding: 0 15px; border-radius: 8px; 
            cursor: pointer; font-weight: bold;
        }
        .btn-mini.del { background: var(--danger); }

        /* Media Upload */
        .media-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px;
        }
        .preview-box {
            background: #080808;
            height: 120px;
            border: 1px dashed var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-top: 5px;
        }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }

        .btn-save { 
            width: 100%; padding: 18px; 
            background: var(--success); 
            color: white; border: none; 
            border-radius: 10px; font-weight: bold; 
            font-size: 18px; cursor: pointer;
            font-family: 'Prompt';
        }
        .btn-save:hover { filter: brightness(1.2); }

        /* Display Table / List */
        .table-container { 
            overflow-x: auto; 
            background: var(--card-bg); 
            border-radius: 15px;
            border: 1px solid var(--border);
        }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 1000px;}
        th { background: #1a1a1a; color: var(--primary); padding: 15px; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover { background: #151515; }

        .thumb-small { width: 80px; height: 50px; border-radius: 5px; object-fit: cover; background: #000; }
        
        .badge {
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 11px;
            background: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-card">
        <h2>✍️ แบบฟอร์ม บันทึกบทความ</h2>
        <form id="articleForm">
            <input type="hidden" id="editId">
            
            <div class="form-section">
                <div>
                    <label>1. วันที่</label>
                    <input type="date" id="customDate" required>
                </div>
                <div>
                    <label>2. หมวดหมู่</label>
                    <select id="category">
                        <option value="🎙️ คำเทศนา">🎙️ คำเทศนา</option>
                        <option value="🌟 คำพยาน">🌟 คำพยาน</option>
                        <option value="📖 บทความ">📖 บทความ</option>
                        <option value="📢 ข่าวสาร">📢 ข่าวสาร</option>
                    </select>
                </div>
                <div class="full-width">
                    <label>3. หัวข้อเรื่อง</label>
                    <input type="text" id="title" placeholder="ใส่ชื่อหัวข้อหลัก..." required>
                </div>
                <div>
                    <label>4. ซีรีย์ (ถ้ามี)</label>
                    <input type="text" id="series" placeholder="ชื่อซีรีย์เนื้อหา...">
                </div>
                <div>
                    <label>5. ผู้เทศนา / ผู้แต่ง</label>
                    <div class="author-group">
                        <select id="authorSelect"></select>
                        <button type="button" class="btn-mini" id="addAuthorBtn">+</button>
                        <button type="button" class="btn-mini del" id="delAuthorBtn">🗑️</button>
                    </div>
                </div>
                <div>
                    <label>6. ข้อพระธรรม</label>
                    <input type="text" id="bibleRef" placeholder="เช่น ยอห์น 3:16 (ฉบับ 1971)">
                </div>
            </div>

            <div class="form-section">
                <div class="full-width"><label style="color:#aaa">📷 ส่วนจัดการภาพประกอบ</label></div>
                <div>
                    <label>8. รูปปกนำ</label>
                    <input type="file" id="fileThumb" accept="image/*">
                    <input type="hidden" id="valThumb">
                    <div class="preview-box" id="preThumb">พรีวิวรูปปก</div>
                </div>
                <div>
                    <label>9. รูปเนื้อหา 1</label>
                    <input type="file" id="filePic1" accept="image/*">
                    <input type="hidden" id="valPic1">
                    <div class="preview-box" id="prePic1">พรีวิวรูป 1</div>
                </div>
                <div>
                    <label>10. รูปเนื้อหา 2</label>
                    <input type="file" id="filePic2" accept="image/*">
                    <input type="hidden" id="valPic2">
                    <div class="preview-box" id="prePic2">พรีวิวรูป 2</div>
                </div>
            </div>

            <div class="form-section">
                <div class="full-width"><label style="color:#aaa">🔗 ส่วนจัดการวิดีโอและลิงก์</label></div>
                <div>
                    <label>11. ลิ้งก์ ยูทูบ 1</label>
                    <input type="text" id="yt1" placeholder="https://www.youtube.com/...">
                </div>
                <div>
                    <label>12. ลิ้งก์ ยูทูบ 2</label>
                    <input type="text" id="yt2" placeholder="https://www.youtube.com/...">
                </div>
                <div>
                    <label>13. ลิ้งก์เพลง / ลิ้งก์อิสระ</label>
                    <input type="text" id="extraLink" placeholder="ใส่ลิงก์เสริมอื่นๆ...">
                </div>
            </div>

            <div class="full-width">
                <label>14. เนื้อหา (รายละเอียด)</label>
                <textarea id="mainContent" rows="8" placeholder="เขียนเนื้อหาอิสระที่นี่..."></textarea>
            </div>
            
            <div class="full-width" style="margin-top:15px;">
                <label>15. หมายเหตุ</label>
                <input type="text" id="note" placeholder="บันทึกช่วยจำ...">
            </div>

            <button type="submit" class="btn-save" id="saveBtn" style="margin-top:25px;">🚀 บันทึกข้อมูลและแสดงผลทันที</button>
        </form>
    </div>

    <div class="admin-card">
        <h2>📑 รายการเนื้อหา (เรียงตามวันที่/หมวดหมู่/ผู้แต่ง)</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>รูปปก</th>
                        <th>วันที่</th>
                        <th>หมวดหมู่</th>
                        <th>หัวข้อ / ซีรีย์</th>
                        <th>ผู้แต่ง</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="articleTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
        authDomain: "bbcchurch-6ffc3.firebaseapp.com",
        projectId: "bbcchurch-6ffc3",
        storageBucket: "bbcchurch-6ffc3.firebasestorage.app",
        appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // ==========================================
    // 1. จัดการรายชื่อผู้แต่ง (Author) Real-time
    // ==========================================
    onSnapshot(collection(db, "authors"), (snap) => {
        const select = document.getElementById("authorSelect");
        select.innerHTML = '<option value="">-- เลือกผู้แต่ง --</option>';
        snap.forEach(d => {
            const auth = d.data();
            select.innerHTML += `<option value="${auth.name}" data-id="${d.id}">${auth.name}</option>`;
        });
    });

    document.getElementById("addAuthorBtn").onclick = async () => {
        const name = prompt("ระบุชื่อผู้เทศนา / ผู้แต่งบทความ ใหม่:");
        if (name) await addDoc(collection(db, "authors"), { name });
    };

    document.getElementById("delAuthorBtn").onclick = async () => {
        const select = document.getElementById("authorSelect");
        const id = select.options[select.selectedIndex].dataset.id;
        if (id && confirm("ลบรายชื่อนี้?")) await deleteDoc(doc(db, "authors", id));
    };

    // ==========================================
    // 2. จัดการรูปภาพ (Upload Helper)
    // ==========================================
    async function uploadFile(fileInput, previewId, hiddenInputId) {
        return new Promise((resolve) => {
            const file = fileInput.files[0];
            if (!file) {
                resolve(document.getElementById(hiddenInputId).value || "");
                return;
            }
            const storageRef = ref(storage, 'articles/' + Date.now() + "_" + file.name);
            const uploadTask = uploadBytesResumable(storageRef, file);
            
            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    document.getElementById(previewId).innerHTML = `<small>กำลังอัปโหลด ${Math.round(progress)}%</small>`;
                }, 
                null, 
                () => {
                    getDownloadURL(uploadTask.snapshot.ref).then((url) => {
                        document.getElementById(previewId).innerHTML = `<img src="${url}">`;
                        resolve(url);
                    });
                }
            );
        });
    }

    // ฟังก์ชันพรีวิวภาพเบื้องต้น (Client Side)
    function setupPreview(inputId, preId) {
        document.getElementById(inputId).onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => document.getElementById(preId).innerHTML = `<img src="${ev.target.result}">`;
                reader.readAsDataURL(file);
            }
        };
    }
    setupPreview("fileThumb", "preThumb");
    setupPreview("filePic1", "prePic1");
    setupPreview("filePic2", "prePic2");

    // ==========================================
    // 3. บันทึกข้อมูลบทความ
    // ==========================================
    document.getElementById("articleForm").onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById("saveBtn");
        btn.disabled = true;
        btn.innerText = "⏳ กำลังบันทึกและพุชข้อมูล...";

        const id = document.getElementById("editId").value;
        const thumbUrl = await uploadFile(document.getElementById("fileThumb"), "preThumb", "valThumb");
        const pic1Url = await uploadFile(document.getElementById("filePic1"), "prePic1", "valPic1");
        const pic2Url = await uploadFile(document.getElementById("filePic2"), "prePic2", "valPic2");

        const data = {
            displayDate: document.getElementById("customDate").value,
            category: document.getElementById("category").value,
            title: document.getElementById("title").value,
            series: document.getElementById("series").value,
            authorName: document.getElementById("authorSelect").value,
            bibleRef: document.getElementById("bibleRef").value,
            thumbUrl: thumbUrl,
            pic1Url: pic1Url,
            pic2Url: pic2Url,
            yt1: document.getElementById("yt1").value,
            yt2: document.getElementById("yt2").value,
            extraLink: document.getElementById("extraLink").value,
            mainContent: document.getElementById("mainContent").value,
            note: document.getElementById("note").value,
            updatedAt: serverTimestamp()
        };

        try {
            if (id) {
                await updateDoc(doc(db, "articles", id), data);
                alert("✅ แก้ไขข้อมูลเรียบร้อย!");
            } else {
                data.createdAt = serverTimestamp();
                await addDoc(collection(db, "articles"), data);
                alert("🚀 บันทึกและแสดงผลทันที!");
            }
            window.location.reload(); // รีเฟรชเพื่อความเคลียร์
        } catch (err) {
            alert("Error: " + err.message);
            btn.disabled = false;
        }
    };

    // ==========================================
    // 4. แสดงผลบทความด้านล่าง (Sorting)
    // ==========================================
    onSnapshot(collection(db, "articles"), (snap) => {
        const tbody = document.getElementById("articleTableBody");
        tbody.innerHTML = "";
        
        let list = [];
        snap.forEach(d => list.push({id: d.id, ...d.data()}));

        // Sorting Logic: วันที่ > หมวดหมู่ > ซีรีย์ > ผู้แต่ง
        list.sort((a, b) => {
            if (b.displayDate !== a.displayDate) return new Date(b.displayDate) - new Date(a.displayDate);
            if (a.category !== b.category) return a.category.localeCompare(b.category);
            if (a.series !== b.series) return (a.series || "").localeCompare(b.series || "");
            return a.authorName.localeCompare(b.authorName);
        });

        list.forEach(item => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><img src="${item.thumbUrl || 'https://placehold.co/80x50?text=No+Pic'}" class="thumb-small"></td>
                <td>${item.displayDate}</td>
                <td><span class="badge">${item.category}</span></td>
                <td>
                    <strong>${item.title}</strong><br>
                    <small style="color:#666">ซีรีย์: ${item.series || '-'}</small>
                </td>
                <td>${item.authorName}</td>
                <td>
                    <button onclick="editArt('${item.id}')" style="cursor:pointer; background:none; border:1px solid #4dabff; color:#4dabff; border-radius:4px; padding:3px 8px;">แก้ไข</button>
                    <button onclick="deleteArt('${item.id}')" style="cursor:pointer; background:none; border:1px solid #e74c3c; color:#e74c3c; border-radius:4px; padding:3px 8px;">ลบ</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    });

    // ==========================================
    // 5. Delete & Edit Article
    // ==========================================
    window.deleteArt = async (id) => {
        if (confirm("ยืนยันการลบถาวร?")) await deleteDoc(doc(db, "articles", id));
    };

    window.editArt = (id) => {
        // ดึงข้อมูลจาก DOM มาใส่ฟอร์ม (หรือจะดึงใหม่จาก Firebase ก็ได้)
        // เพื่อความง่ายในตัวอย่างนี้ แนะนำให้กดปุ่มแล้วหน้าจอเลื่อนขึ้นไปข้างบนเพื่อกรอกใหม่
        alert("กรุณาดูข้อมูลเดิมเพื่อแก้ไข (ระบบกำลังเตรียมข้อมูลบนฟอร์ม)");
        // Logic การดึงข้อมูลเข้าฟอร์ม...
    };

</script>

</body>
</html>
