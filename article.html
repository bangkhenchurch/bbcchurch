<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>บทความ</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="app">กำลังโหลดข้อมูล...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
            projectId: "bbcchurch-6ffc3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const id = new URLSearchParams(window.location.search).get('id');

        // แก้ไข: ใช้ชื่อคอลเลกชัน 'articles' ให้ตรงกับ Database ของคุณ
        db.collection("articles").doc(id).get().then((doc) => {
            if (doc.exists) {
                document.getElementById('app').innerHTML = `<h1>${doc.data().title}</h1><p>${doc.data().content}</p>`;
            } else {
                document.getElementById('app').innerHTML = "ไม่พบเอกสารนี้ในฐานข้อมูล";
            }
        }).catch((error) => {
            document.getElementById('app').innerHTML = "เกิดข้อผิดพลาด: " + error.message;
        });
    </script>
</body>
</html>
