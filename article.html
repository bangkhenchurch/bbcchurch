<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  query,
  where,
  onSnapshot,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
  authDomain: "bbcchurch-6ffc3.firebaseapp.com",
  projectId: "bbcchurch-6ffc3",
  storageBucket: "bbcchurch-6ffc3.appspot.com",
  appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const storage = getStorage(app);

const artId = new URLSearchParams(window.location.search).get('id');


// ===========================
// แสดง/ซ่อน address
// ===========================

document.getElementById('opt2').onchange = function () {
  document.getElementById('addressBox').style.display =
    this.checked ? 'block' : 'none';
};


// ===========================
// upload รูป
// ===========================

async function uploadImage(file) {

  if (!file) return "";

  const fileName = Date.now() + "_" + file.name;

  const storageRef = ref(storage, "contacts/" + fileName);

  await uploadBytes(storageRef, file);

  const url = await getDownloadURL(storageRef);

  return url;
}


// ===========================
// ส่งฟอร์มติดต่อ
// ===========================

document.getElementById('contactForm').onsubmit = async (e) => {

  e.preventDefault();

  const btn = document.getElementById('sendBtn');

  btn.disabled = true;
  btn.innerText = "กำลังส่งข้อมูล...";

  try {

    const options = Array.from(
      document.querySelectorAll('input[name="opt"]:checked')
    ).map(cb => cb.value);

    // upload รูป
    let imageUrl = "";

    const imageInput = document.getElementById('contactImage');

    if (imageInput && imageInput.files.length > 0) {

      btn.innerText = "กำลังอัปโหลดรูป...";

      imageUrl = await uploadImage(imageInput.files[0]);
    }

    // save firestore
    await addDoc(collection(db, "contacts"), {

      articleId: artId || "general",

      name: document.getElementById('contactName').value,

      phone: document.getElementById('contactPhone').value,

      needs: options,

      address: document.getElementById('contactAddress').value,

      note: document.getElementById('contactNote').value,

      imageUrl: imageUrl,

      createdAt: serverTimestamp()
    });

    alert("ส่งข้อมูลเรียบร้อยแล้ว");

    document.getElementById('contactForm').reset();

    document.getElementById('addressBox').style.display = 'none';

  } catch (err) {

    console.error(err);

    alert("เกิดข้อผิดพลาดในการส่งข้อมูล");

  } finally {

    btn.disabled = false;

    btn.innerText = "ส่งข้อมูล";
  }
};


// ===========================
// สร้าง media
// ===========================

function createMediaHTML(url) {

  if (!url || url === "" || url === "undefined") return "";

  const yid = (
    url.match(
      /(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&]{11})/
    ) || []
  )[1];

  if (yid) {

    return `
      <div class="video-container">
        <iframe
          src="https://www.youtube.com/embed/${yid}"
          frameborder="0"
          allowfullscreen>
        </iframe>
      </div>
    `;
  }

  return `
    <img
      src="${url}"
      class="media-full-width"
      loading="lazy"
      onerror="this.style.display='none';">
  `;
}


// ===========================
// โหลดบทความ
// ===========================

async function loadContent() {

  if (!artId) return;

  try {

    const snap = await getDoc(doc(db, "articles", artId));

    if (snap.exists()) {

      const r = snap.data();

      document.title = r.title || "BBC Church";

      document.getElementById('artTitle').innerText =
        r.title || "-";

      let prefix = "ผู้แต่ง: ";

      const category = r.category || "";

      if (category.includes("เทศนา")) {
        prefix = "ผู้เทศนา: ";
      }
      else if (category.includes("คำพยาน")) {
        prefix = "เจ้าของคำพยาน: ";
      }
      else if (category.includes("ประกาศ")) {
        prefix = "เจ้าหน้าที่คริสตจักร: ";
      }

      let finalName =
        r.author ||
        r.authorName ||
        "คริสตจักร";

      document.getElementById('catDisp').innerText =
        "☀️ " + category;

      document.getElementById('artMeta').innerHTML =
        `${prefix}<b>${finalName}</b> | วันที่: <b>${r.displayDate || '-'}</b>`;

      let topHtml = createMediaHTML(r.thumbUrl);

      if (r.youtubeUrl) {
        topHtml += createMediaHTML(r.youtubeUrl);
      }

      document.getElementById('topDisplay').innerHTML = topHtml;

      document.getElementById('artBody').innerText =
        r.content || "";

      let detailsHtml = "";

      const imgs = [
        r.arc1 || r.contentImg1,
        r.arc2 || r.contentImg2,
        r.arc3 || r.archiveUrl
      ];

      imgs.forEach(url => {

        if (url) {
          detailsHtml += createMediaHTML(url);
        }

      });

      document.getElementById('detailsDisplay').innerHTML =
        detailsHtml;

      loadRatings();
    }

  } catch (err) {

    console.error(err);

    alert("โหลดบทความไม่สำเร็จ");
  }
}


// ===========================
// โหลด comments
// ===========================

function loadRatings() {

  const q = query(
    collection(db, "ratings"),
    where("articleId", "==", artId),
    where("approved", "==", true)
  );

  onSnapshot(q, (snapshot) => {

    let html = `
      <h3 style="
        font-family:'Prompt';
        font-size:18px;
        margin-bottom:15px;
        color:white;
      ">
        ความคิดเห็นจากพี่น้อง
      </h3>
    `;

    let totalStars = 0;

    if (!snapshot.empty) {

      snapshot.forEach((docx) => {

        const data = docx.data();

        totalStars += data.rating;

        html += `
          <div class="comment-item">
            <div class="comment-user">
              ${data.userName}
              - ${'⭐'.repeat(data.rating)}
            </div>

            <div class="comment-text">
              ${data.comment}
            </div>
          </div>
        `;
      });

      document.getElementById('commentList').innerHTML = html;

      const avg =
        (totalStars / snapshot.size).toFixed(1);

      document.getElementById('artRatingHeader').innerText =
        `${'⭐'.repeat(Math.round(avg))}
        (${avg}/5 จาก ${snapshot.size} คน)`;
    }
  });
}


// ===========================
// ส่งความคิดเห็น
// ===========================

document.getElementById('submitRatingBtn').onclick = async () => {

  const name =
    document.getElementById('uName').value.trim();

  const msg =
    document.getElementById('uMsg').value.trim();

  const stars =
    parseInt(document.getElementById('uStars').value);

  if (!name || !msg) {

    alert("กรุณากรอกชื่อและข้อความ");

    return;
  }

  try {

    await addDoc(collection(db, "ratings"), {

      articleId: artId,

      userName: name,

      comment: msg,

      rating: stars,

      approved: true,

      createdAt: serverTimestamp()
    });

    alert("ขอบคุณสำหรับคำหนุนใจครับ!");

    document.getElementById('uName').value = "";

    document.getElementById('uMsg').value = "";

  } catch (e) {

    console.error(e);

    alert("เกิดข้อผิดพลาด");
  }
};


// เริ่มโหลด
loadContent();

</script>
