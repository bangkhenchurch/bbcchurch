<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>อ่านบทความ - BBC Church</title>

<link rel="icon" type="image/png" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#4dabff;
    --dark-bg:#121212;
    --card-bg:#1e1e1e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    overflow-x:hidden;
}

body{
    background:var(--dark-bg);
    color:#e0e0e0;
    font-family:'Sarabun',sans-serif;
    line-height:1.6;
}

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
    padding:20px;
}

/* =========================
   MAIN LAYOUT
========================= */

.main-layout{
    display:flex;
    gap:20px;
    align-items:flex-start;
}

/* =========================
   SIDEBAR
========================= */

.left-sidebar{
    width:320px;
    min-width:320px;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:15px;
    padding:15px;
    position:sticky;
    top:20px;
}

.sidebar-title{
    font-family:'Prompt';
    color:var(--primary);
    font-size:22px;
    margin-bottom:15px;
    border-bottom:1px solid #333;
    padding-bottom:10px;
}

.news-item{
    display:block;
    text-decoration:none;
    color:#eee;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    background:#252525;
    transition:0.3s;
    border-left:4px solid var(--primary);
}

.news-item:hover{
    background:#303030;
}

.news-date{
    font-size:12px;
    color:#999;
    margin-bottom:5px;
}

.news-title{
    font-size:15px;
    line-height:1.5;
}

/* =========================
   CONTENT AREA
========================= */

.content-area{
    flex:1;
    min-width:0;
}

.article-card{
    background:var(--card-bg);
    padding:30px;
    border-radius:15px;
    border:1px solid #333;
}

h1{
    font-family:'Prompt';
    color:white;
    font-size:28px;
    margin-bottom:10px;
}

.article-meta{
    color:#aaa;
    font-size:14px;
    margin-bottom:20px;
    border-bottom:1px solid #333;
    padding-bottom:15px;
}

.article-meta b{
    color:var(--primary);
}

.media-full-width{
    width:100%;
    max-width:100%;
    height:auto;
    border-radius:10px;
    margin-bottom:20px;
    display:block;
}

.content-text{
    line-height:1.8;
    font-size:17px;
    white-space:pre-wrap;
    color:#eee;
    margin:25px 0;
    word-break:break-word;
}

.video-container{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    height:0;
    margin:20px 0;
    border-radius:12px;
    overflow:hidden;
    background:#000;
}

.video-container iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

.comment-display-area{
    margin-top:30px;
    border-top:1px solid #333;
    padding-top:20px;
}

.comment-item{
    background:#252525;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    border-left:4px solid var(--primary);
}

.comment-user{
    font-weight:bold;
    color:var(--primary);
    margin-bottom:5px;
    font-family:'Prompt';
}

.comment-text{
    color:#ccc;
    font-size:15px;
}

/* =========================
   RATING FORM
========================= */

.rating-form{
    background:#1a1a1a;
    padding:25px;
    border-radius:15px;
    border:1px dashed #444;
    margin:40px 0;
}

.u-input{
    width:100%;
    padding:12px;
    background:#000;
    border:1px solid #333;
    color:white;
    border-radius:8px;
    margin-bottom:10px;
}

.btn-submit-rating{
    width:100%;
    padding:15px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* =========================
   CONTACT
========================= */

.contact-section{
    background:#ffffff;
    color:#333;
    padding:30px;
    border-radius:20px;
    margin-top:20px;
}

/* =========================
   COUNTER
========================= */

.counter-section{
    text-align:center;
    border-top:1px solid #eee;
    padding:30px 15px;
    background:#1a1a1a;
    border-radius:15px;
    margin:40px 0;
    color:#ffffff;
    overflow:hidden;
}

.counter-section img{
    max-width:100%;
    height:auto;
}

.qr-code{
    width:140px;
    border:4px solid white;
    border-radius:10px;
    margin-top:10px;
}

/* =========================
   FOOTER
========================= */

footer{
    background:#051937;
    color:white;
    text-align:center;
    padding:40px 20px;
    margin-top:50px;
}

footer img{
    width:60px;
    margin-bottom:10px;
}

.footer-address{
    font-size:14px;
    color:#aaa;
    margin-top:10px;
}

/* =========================
   MOBILE
========================= */

@media(max-width:980px){

    .main-layout{
        flex-direction:column;
    }

    .left-sidebar{
        width:100%;
        min-width:100%;
        position:relative;
        top:0;
    }

    .container{
        padding:12px;
    }

    .article-card{
        padding:20px;
    }

    h1{
        font-size:24px;
        line-height:1.4;
    }

}

</style>
</head>

<body>

<div class="container">

    <div style="margin-bottom:20px;">
        <a href="index.html" style="color:var(--primary); text-decoration:none; font-family:'Prompt';">
            ← กลับหน้าหลัก
        </a>
    </div>

    <div class="main-layout">

        <!-- SIDEBAR -->
        <aside class="left-sidebar">

            <div class="sidebar-title">
                ข่าวสารคริสตจักร
            </div>

            <a href="#" class="news-item">
                <div class="news-date">20 พฤษภาคม 2026</div>
                <div class="news-title">นมัสการวันอาทิตย์นี้</div>
            </a>

            <a href="#" class="news-item">
                <div class="news-date">18 พฤษภาคม 2026</div>
                <div class="news-title">กิจกรรมสามัคคีธรรม</div>
            </a>

            <a href="#" class="news-item">
                <div class="news-date">15 พฤษภาคม 2026</div>
                <div class="news-title">ประกาศคำสอนประจำสัปดาห์</div>
            </a>

        </aside>

        <!-- CONTENT -->
        <div class="content-area">

            <article class="article-card">

                <div id="catDisp" style="color:var(--primary); font-family:'Prompt'; font-weight:bold; margin-bottom:5px;"></div>

                <h1 id="artTitle">
                    กำลังโหลดเนื้อหา...
                </h1>

                <div id="artRatingHeader" style="color:#f1c40f; font-family:'Prompt'; margin-bottom:15px;">
                    ☆☆☆☆☆ (0)
                </div>

                <div id="artMeta" class="article-meta"></div>

                <div id="topDisplay"></div>

                <div id="artBody" class="content-text"></div>

                <div id="detailsDisplay"></div>

                <div class="comment-display-area" id="commentList"></div>

            </article>

            <!-- FORM -->
            <div class="rating-form">

                <h3 style="font-family:'Prompt'; color:white; margin-bottom:10px;">
                    ⭐️ ให้คะแนนและแบ่งปันพระพร
                </h3>

                <select id="uStars" class="u-input">
                    <option value="5">⭐⭐⭐⭐⭐ (ยอดเยี่ยม)</option>
                    <option value="4">⭐⭐⭐⭐ (ดีมาก)</option>
                    <option value="3">⭐⭐⭐ (ดี)</option>
                    <option value="2">⭐⭐ (พอใช้)</option>
                    <option value="1">⭐ (ควรปรับปรุง)</option>
                </select>

                <input type="text" id="uName" class="u-input" placeholder="ชื่อของคุณ">

                <textarea id="uMsg" class="u-input" rows="3" placeholder="เขียนความประทับใจของคุณ..."></textarea>

                <button id="submitRatingBtn" class="btn-submit-rating">
                    ส่งความคิดเห็น
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
