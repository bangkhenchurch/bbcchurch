<style>
/* ===== LAYOUT ===== */
.main-layout-wrap{
    width:100%;
    display:flex;
    gap:25px;
    align-items:flex-start;
    margin-top:25px;
}

/* ===== LEFT SIDEBAR ===== */
.left-news-sidebar{
    width:320px;
    min-width:320px;
    background:#1b1b1b;
    border:1px solid #333;
    border-radius:18px;
    overflow:hidden;
    position:sticky;
    top:15px;
}

.sidebar-header{
    background:linear-gradient(135deg,#4dabff,#007bff);
    padding:18px;
    font-family:'Prompt',sans-serif;
    font-size:20px;
    font-weight:bold;
    color:#fff;
    text-align:center;
}

.news-scroll-area{
    max-height:1200px;
    overflow-y:auto;
}

.news-scroll-area::-webkit-scrollbar{
    width:7px;
}

.news-scroll-area::-webkit-scrollbar-thumb{
    background:#4dabff;
    border-radius:10px;
}

.news-item{
    padding:16px;
    border-bottom:1px solid #2d2d2d;
    transition:0.3s;
}

.news-item:hover{
    background:#222;
}

.news-item:last-child{
    border-bottom:none;
}

.news-link{
    text-decoration:none;
    display:block;
}

.news-date{
    color:#4dabff;
    font-size:13px;
    margin-bottom:8px;
    font-weight:bold;
    font-family:'Prompt',sans-serif;
}

.news-title{
    color:#fff;
    font-size:16px;
    line-height:1.6;
    font-weight:700;
    margin-bottom:10px;
}

.news-content{
    color:#bdbdbd;
    font-size:14px;
    line-height:1.7;
    display:-webkit-box;
    -webkit-line-clamp:4;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.news-thumb{
    width:100%;
    border-radius:12px;
    margin-top:12px;
    object-fit:cover;
    max-height:180px;
    border:1px solid #333;
}

/* ===== RIGHT CONTENT ===== */
.main-page-content{
    flex:1;
    min-width:0;
}

/* ===== MOBILE ===== */
@media(max-width:991px){

    .main-layout-wrap{
        flex-direction:column;
    }

    .left-news-sidebar{
        width:100%;
        min-width:100%;
        position:relative;
        top:0;
    }

    .news-scroll-area{
        max-height:none;
    }
}
</style>

<!-- ===== START LAYOUT ===== -->
<div class="main-layout-wrap">

    <!-- ===== SIDEBAR LEFT ===== -->
    <aside class="left-news-sidebar">

        <div class="sidebar-header">
            ข่าวสารคริสตจักร
        </div>

        <div id="churchNewsSidebar" class="news-scroll-area">

            <div style="padding:20px; text-align:center; color:#aaa;">
                กำลังโหลดข่าวสาร...
            </div>

        </div>

    </aside>

    <!-- ===== เนื้อหาเดิมของเว็บ ===== -->
    <div class="main-page-content">

        <!--
            ย้ายเนื้อหาเดิมทั้งหมดของหน้า
            มาไว้ในนี้

            ตัวอย่าง:
            article-card

            ฯลฯ
        -->



<!-- ===== ปิด main-page-content ===== -->
</div>

<script type="module">

/* =========================================================
   IMPORT FIREBASE เพิ่ม query orderBy limit
========================================================= */

import {
    initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
    getFirestore,
    collection,
    query,
    where,
    orderBy,
    limit,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* =========================================================
   FIREBASE CONFIG
========================================================= */

const firebaseConfig = {
    apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
    authDomain: "bbcchurch-6ffc3.firebaseapp.com",
    projectId: "bbcchurch-6ffc3",
    storageBucket: "bbcchurch-6ffc3.appspot.com",
    appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================================================
   โหลดข่าวสารคริสตจักร
========================================================= */

async function loadChurchNewsSidebar(){

    const wrap = document.getElementById("churchNewsSidebar");

    try{

        /* ==============================
           โหลดเฉพาะหมวด ข่าวสารคริสตจักร
        ============================== */

        const q = query(
            collection(db,"articles"),
            where("category","==","ข่าวสารคริสตจักร"),
            orderBy("createdAt","desc"),
            limit(30)
        );

        const snapshot = await getDocs(q);

        if(snapshot.empty){

            wrap.innerHTML = `
                <div style="
                    padding:25px;
                    text-align:center;
                    color:#999;
                    line-height:1.8;
                ">
                    ยังไม่มีข่าวสารคริสตจักร
                </div>
            `;

            return;
        }

        let html = "";

        snapshot.forEach((doc)=>{

            const data = doc.data();

            const id = doc.id;

            const title = data.title || "ไม่มีหัวข้อ";

            const content = data.content || "";

            const date =
                data.displayDate ||
                "-";

            const thumb =
                data.thumbUrl ||
                data.contentImg1 ||
                "";

            /* ==============================
               ตรวจ path ปัจจุบัน
            ============================== */

            let targetPage = "article.html";

            if(location.pathname.includes("testimony")){
                targetPage = "article.html";
            }

            if(location.pathname.includes("sermon")){
                targetPage = "article.html";
            }

            html += `

            <div class="news-item">

                <a class="news-link"
                   href="${targetPage}?id=${id}">

                    <div class="news-date">
                        📅 ${date}
                    </div>

                    <div class="news-title">
                        ${title}
                    </div>

                    <div class="news-content">
                        ${content}
                    </div>

                    ${
                        thumb
                        ?
                        `
                        <img
                            src="${thumb}"
                            class="news-thumb"
                            loading="lazy"
                            onerror="this.style.display='none';"
                        >
                        `
                        :
                        ""
                    }

                </a>

            </div>

            `;

        });

        wrap.innerHTML = html;

    }catch(err){

        console.error(err);

        wrap.innerHTML = `
            <div style="
                padding:25px;
                text-align:center;
                color:#ff7675;
                line-height:1.8;
            ">
                โหลดข่าวสารไม่สำเร็จ
            </div>
        `;
    }
}

/* =========================================================
   START
========================================================= */

loadChurchNewsSidebar();

</script>
