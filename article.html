<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียด - Bangkhen Baptist Church</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-blue: #2196F3;
            --text-color: #ffffff;
            --text-muted: #b0b0b0;
            --accent-red: #ff4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .error-box {
            text-align: center;
            padding: 30px 10px;
        }

        .error-icon {
            color: var(--accent-red);
            font-size: 48px;
            margin-bottom: 10px;
        }

        .article-title {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .meta-box {
            background-color: rgba(255,255,255,0.05);
            border-left: 4px solid var(--primary-blue);
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .meta-item {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            color: var(--text-muted);
        }

        .meta-item strong {
            color: var(--text-color);
            margin-right: 5px;
        }

        .meta-item:last-child {
            margin-bottom: 0;
        }

        .article-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            object-fit: cover;
        }

        .article-content {
            font-size: 16px;
            line-height: 1.8;
            color: #e0e0e0;
            white-space: pre-wrap; /* เพื่อให้เว้นบรรทัดตามข้อมูลที่พิมพ์มา */
            margin-bottom: 20px;
        }

        .loading-status {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-back">← กลับหน้าหลัก</a>

        <div id="loading" class="loading-status">
            กำลังโหลดเนื้อหา...
        </div>

        <div id="error-view" class="error-box" style="display: none;">
            <div class="error-icon">❌</div>
            <h2 id="error-message">ไม่มี ID บทความใน URL</h2>
        </div>

        <div id="article-view" style="display: none;">
            <h1 id="title" class="article-title"></h1>
            
            <div class="meta-box">
                <div class="meta-item">📁 <strong>หมวดหมู่:</strong> <span id="category"></span></div>
                <div class="meta-item">👤 <strong>ผู้เขียน/ผู้เทศนา:</strong> <span id="author"></span></div>
                <div class="meta-item">📅 <strong>วันที่:</strong> <span id="date"></span></div>
                <div class="meta-item">🔖 <strong>ซีรีย์:</strong> <span id="series"></span></div>
            </div>

            <img id="cover-image" class="article-image" src="" alt="ภาพประกอบบทความ" style="display: none;">

            <div id="content" class="article-content"></div>
        </div>
    </div>

    <script>
        // 1. ฟังก์ชันดึงค่า Parameter จาก URL
        function getArticleIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id'); // ดึงค่าจาก ?id=xxxx
        }

        // 2. ฟังก์ชันหลักในการทำงานเมื่อโหลดหน้าเว็บ
        async function loadArticle() {
            const articleId = getArticleIdFromURL();
            const loadingEl = document.getElementById('loading');
            const errorViewEl = document.getElementById('error-view');
            const errorMessageEl = document.getElementById('error-message');
            const articleViewEl = document.getElementById('article-view');

            // ตรวจสอบว่ามี ID ใน URL หรือไม่
            if (!articleId) {
                loadingEl.style.display = 'none';
                errorMessageEl.innerText = 'ไม่มี ID บทความใน URL';
                errorViewEl.style.style.display = 'block';
                return;
            }

            try {
                /* [คำแนะนำการเชื่อมต่อข้อมูล]
                  หากคุณใช้ไฟล์ JSON ในคลัง (Repository) ให้เปลี่ยน URL ด้านล่างเป็นไฟล์ของคุณ เช่น:
                  const response = await fetch('blogs.json');
                  const data = await response.json();
                  const article = data.find(item => item.id === articleId);
                */
                
                // ตัวอย่างจำลองข้อมูลจริงเพื่อเช็คการแสดงผล (ให้แทนที่ด้วยโค้ดดึงข้อมูลจาก Firebase หรือ JSON ของคุณ)
                const article = await fetchArticleFromSource(articleId); 

                if (!article) {
                    loadingEl.style.display = 'none';
                    errorMessageEl.innerText = 'ไม่พบเนื้อหาบทความที่ระบุ';
                    errorViewEl.style.display = 'block';
                    return;
                }

                // นำข้อมูลไปใส่ใน HTML elements
                document.getElementById('title').innerText = article.title || 'ไม่มีชื่อหัวข้อ';
                document.getElementById('category').innerText = article.category || 'ทั่วไป';
                document.getElementById('author').innerText = article.author || 'ไม่ระบุผู้เขียน';
                document.getElementById('date').innerText = article.date || '-';
                document.getElementById('series').innerText = article.series || '-';
                
                // ตรวจสอบฟิลด์เนื้อหาหลัก (เช็คชื่อฟิลด์ให้ตรงกับ Database เช่น content หรือ detail)
                const mainContent = article.content || article.detail || article.description;
                if (mainContent) {
                    document.getElementById('content').innerHTML = mainContent;
                } else {
                    document.getElementById('content').innerText = 'ไม่มีรายละเอียดเนื้อหา';
                }

                // จัดการรูปภาพหน้าปก
                const imgEl = document.getElementById('cover-image');
                if (article.image || article.imageUrl) {
                    imgEl.src = article.image || article.imageUrl;
                    imgEl.style.display = 'block';
                }

                // ซ่อนสถานะโหลด แล้วแสดงเนื้อหาบทความ
                loadingEl.style.display = 'none';
                articleViewEl.style.display = 'block';

            } catch (error) {
                console.error("Error loading article:", error);
                loadingEl.style.display = 'none';
                errorMessageEl.innerText = 'เกิดข้อผิดพลาดในการโหลดข้อมูล';
                errorViewEl.style.display = 'block';
            }
        }

        // ฟังก์ชันจำลองโครงสร้างข้อมูลเพื่อทดสอบการทำงาน
        async function fetchArticleFromSource(id) {
            // ในขั้นตอนใช้งานจริง ให้แก้ไขฟังก์ชันนี้เพื่อไปเชื่อมต่อ fetch() ดึงจากระบบข้อมูลหลักของคุณ
            const mockData = {
                "2026-05-21": {
                    title: "รับใช้กันด้วยความรัก",
                    category: "บทความทั่วไป",
                    author: "คุณอรวรรณ บัวราช",
                    date: "2026-05-21",
                    series: "รับใช้ผู้อื่น",
                    image: "hero_01.png",
                    content: "กาลเทีย 5:13-17 ... ดูก่อนพี่น้องทั้งหลาย ที่ทรงเรียกท่านก็เพื่อให้มีเสรีภาพ แต่อย่าเอาเสรีภาพเป็นช่องทางเนื้อหนัง แต่จงรับใช้กันและกันด้วยความรักเถิด เพราะธรรมบัญญัติทั้งสิ้นนั้นสรุปได้เป็นคำเดียว คือว่าจงรักเพื่อนบ้านเหมือนรักตนเอง"
                }
            };
            return mockData[id] || null;
        }

        // สั่งให้ฟังก์ชันทำงานทันทีที่หน้าเว็บโหลดเสร็จ
        window.onload = loadArticle;
    </script>
</body>
</html>
