<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>คลังข้อมูล - Bangkhen Baptist Church</title>

<link rel="icon" type="image/png" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    overflow-x:hidden;
    background:#121212;
    color:#eee;
    font-family:'Sarabun',sans-serif;
    line-height:1.6;
}

/* ===== NAVBAR ===== */

.navbar{
    width:100%;
    background:#0a2c6d;
    padding:12px 5%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:9999;
    box-shadow:0 2px 12px rgba(0,0,0,.5);
}

.nav-brand{
    display:flex;
    align-items:center;
    gap:12px;
}

.navbar img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}

.navbar span{
    font-family:'Prompt';
    font-size:15px;
    font-weight:600;
    color:#fff;
}

.sidebar-toggle{
    border:none;
    background:#ff6b6b;
    color:#fff;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
    font-family:'Prompt';
    font-weight:600;
    font-size:14px;
    box-shadow:0 5px 15px rgba(255,107,107,.4);
}

/* ===== MENU ===== */

.horizontal-menu{
    max-width:1200px;
    margin:20px auto;
    background:#1d1d1d;
    border:1px solid #333;
    border-radius:30px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    padding:12px;
}

.horizontal-menu a{
    color:#ccc;
    text-decoration:none;
    padding:10px 18px;
    border-radius:25px;
    transition:.25s;
    font-family:'Prompt';
    font-size:14px;
}

.horizontal-menu a:hover,
.horizontal-menu a.active{
    background:#4dabff;
    color:#fff;
}

/* ===== LAYOUT ===== */

.main-layout{
    max-width:1200px;
    margin:auto;
    padding:15px;
    display:flex;
    gap:25px;
    align-items:flex-start;
}

/* ===== SIDEBAR ===== */

.sidebar-left{
    width:280px;
    flex-shrink:0;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:18px;
    padding:20px;
    position:sticky;
    top:90px;
    height:fit-content;
}

.sidebar-title{
    color:#ffbc42;
    font-family:'Prompt';
    font-size:16px;
    font-weight:600;
    margin-bottom:20px;
    border-bottom:2px solid #ffbc42;
    padding-bottom:10px;
}

.tree-category{
    background:#222;
    border-radius:14px;
    padding:12px;
    margin-bottom:18px;
}

.article-border{
    border-left:4px solid #4dabff;
}

.witness-border{
    border-left:4px solid #2ecc71;
}

.sermon-border{
    border-left:4px solid #e74c3c;
}

.tree-cat-title{
    font-family:'Prompt';
    font-size:14px;
    font-weight:600;
    margin-bottom:10px;
    color:#fff;
}

.tree-sub{
    margin-bottom:15px;
}

.tree-sub-title{
    color:#aaa;
    font-size:12px;
    font-weight:bold;
    margin-bottom:6px;
}

.tree-list{
    list-style:none;
}

.tree-list li{
    margin:5px 0;
}

.tree-list a{
    display:block;
    background:#2d2d2d;
    color:#ddd;
    padding:7px 10px;
    border-radius:8px;
    font-size:13px;
    text-decoration:none;
    transition:.2s;
    cursor:pointer;
}

.tree-list a:hover{
    background:#4dabff;
    color:#fff;
}

/* ===== CONTENT ===== */

.content-area{
    flex:1;
    min-width:0;
}

.section-title{
    font-family:'Prompt';
    font-size:24px;
    color:#4dabff;
    border-left:5px solid #4dabff;
    padding-left:15px;
    margin-bottom:25px;
}

/* ===== DETAIL ===== */

.detail-box{
    background:#1e1e1e;
    border:1px solid #333;
    border-radius:20px;
    padding:25px;
    margin-bottom:30px;
    overflow:hidden;
}

.detail-title{
    font-family:'Prompt';
    font-size:30px;
    font-weight:600;
    color:#fff;
    margin-bottom:20px;
    line-height:1.5;
    word-break:break-word;
}

.detail-meta{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    border-bottom:1px solid #333;
    padding-bottom:18px;
    margin-bottom:25px;
    color:#aaa;
    font-size:14px;
}

.meta-item{
    display:flex;
    align-items:center;
    gap:5px;
}

.meta-label{
    color:#4dabff;
    font-weight:bold;
}

.detail-banner{
    width:100%;
    max-width:100%;
    height:auto;
    display:block;
    border-radius:16px;
    margin-bottom:25px;
    border:1px solid #333;
    background:#2a2a2a;
    object-fit:cover;
}

.detail-content{
    font-size:16px;
    line-height:1.9;
    color:#ddd;
    white-space:pre-line;
    word-break:break-word;
    overflow-wrap:break-word;
    margin-bottom:30px;
}

/* ===== VIDEO ===== */

.video-wrapper{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    height:0;
    overflow:hidden;
    border-radius:16px;
    margin-bottom:25px;
}

.video-wrapper iframe{
    position:absolute;
    width:100%;
    height:100%;
    left:0;
    top:0;
}

/* ===== GRID ===== */

.grid-container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:25px;
}

/* ===== CARD ===== */

.card{
    background:#1e1e1e;
    border:1px solid #333;
    border-radius:16px;
    overflow:hidden;
    transition:.25s;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    height:100%;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#4dabff;
}

.card img{
    width:100%;
    max-width:100%;
    height:auto;
    display:block;
    object-fit:cover;
}

.card-content{
    padding:15px;
    display:flex;
    flex-direction:column;
    flex:1;
}

.card-title{
    font-family:'Prompt';
    font-size:17px;
    color:#fff;
    margin-bottom:10px;
    line-height:1.5;
}

.card-info{
    font-size:13px;
    color:#bbb;
    margin-bottom:12px;
    flex:1;
}

.info-label{
    color:#4dabff;
    font-weight:bold;
}

.card-meta{
    border-top:1px solid #333;
    padding-top:10px;
    margin-top:auto;
    display:flex;
    justify-content:space-between;
    color:#888;
    font-size:12px;
}

/* ===== COUNTER ===== */

.counter-section{
    text-align:center;
    padding:40px 20px;
    border-top:1px solid #333;
}

.counter-section img{
    max-width:100%;
}

/* ===== FOOTER ===== */

footer{
    background:#0a2c6d;
    text-align:center;
    padding:40px 20px;
}

footer img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
}

/* ===== MOBILE ===== */

@media(max-width:992px){

    .main-layout{
        display:block;
    }

    .sidebar-left{
        position:fixed;
        top:0;
        left:-320px;
        width:280px;
        height:100%;
        overflow-y:auto;
        z-index:99999;
        transition:.3s;
        background:#151515;
        box-shadow:5px 0 15px rgba(0,0,0,.7);
    }

    .sidebar-left.open{
        left:0;
    }

}

@media(max-width:768px){

    .navbar{
        padding:12px 15px;
    }

    .navbar span{
        font-size:14px;
    }

    .sidebar-toggle{
        font-size:13px;
        padding:8px 12px;
    }

    .horizontal-menu{
        margin:15px;
        padding:10px;
        border-radius:24px;
    }

    .horizontal-menu a{
        font-size:13px;
        padding:8px 12px;
    }

    .main-layout{
        padding:15px;
    }

    .detail-box{
        padding:20px;
    }

    .detail-title{
        font-size:22px;
    }

    .detail-meta{
        gap:10px;
        font-size:13px;
    }

    .detail-content{
        font-size:15px;
    }

}

</style>
</head>
