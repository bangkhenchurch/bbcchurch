<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangkhen Baptist Church</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4dabff; --dark-bg: #121212; --card-bg: #1e1e1e; --max-width: 900px; }
        body { background: #0a0a0a; color: #eeeeee; font-family: 'Sarabun', sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* Navbar */
        .navbar-wrapper { background: #0a2c6d; padding: 10px 0; }
        .navbar { max-width: var(--max-width); margin: auto; padding: 0 20px; display: flex; align-items: center; gap: 15px; }
        
        /* Hero */
        .hero-container { max-width: var(--max-width); margin: 10px auto; padding: 0 20px; }
        .hero-container img { width: 100%; height: 250px; object-fit: cover; border-radius: 15px; }

        /* Container for content */
        .container { padding: 20px; max-width: var(--max-width); margin: auto; }
        .content-card { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid #333; }
        
        /* Menu */
        .horizontal-menu { display: flex; justify-content: center; gap: 20px; padding: 15px; background: #1e1e1e; flex-wrap: wrap; border-bottom: 1px solid #333; }
        .horizontal-menu a { color: #fff; text-decoration: none; font-family: 'Prompt'; font-size: 14px; }

        .thumb-img { width: 100%; border-radius: 10px; margin-bottom: 25px; }
        .main-text { font-size: 18px; white-space: pre-wrap; color: #ddd; }
        .btn-back { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #333; color: #fff; text-decoration: none; border-radius: 8px; font-family: 'Prompt'; }
    </style>
</head>
<body>

<div class="navbar-wrapper">
    <nav class="navbar">
        <img src="logo.png" style="width:40px; height:40px; border-radius:50%; background:#fff;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3504/3504000.png'">
        <span style="font-family:'Prompt'; font-weight: 600; font-size: 1.2rem;">Bangkhen Baptist Church</span>
    </nav>
</div>

<div class="hero-container">

</div>

<nav class="horizontal-menu">

    <a href="contact.html">📞 ติดต่อเรา</a>
</nav>

        <h1 id="displayTitle" style="font-family:'Prompt';">กำลังโหลด...</h1>
        <div id="displayThumb"></div>
        <div id="displayBody" class="main-text"></div>
        <a href="javascript:history.back()" class="btn-back">⬅️ กลับหน้าหลัก</a>
    </article>
</div>
