<div class="container">

<h1 data-lang="contact_title"></h1>

<div class="card">

<p>📞 02-5798764</p>
<p>📧 bbc_bangkok@gmail.com</p>

<form onsubmit="sendLine(event)">
<input id="name" placeholder="ชื่อ" required>
<input id="email" placeholder="email" required>
<textarea id="msg" placeholder="ข้อความ" required></textarea>
<button data-lang="send"></button>
</form>

</div>
</div>

<div class="flag">
<a href="https://info.flagcounter.com/KQe9">
<img src="https://s01.flagcounter.com/count2/KQe9/bg_FFFFFF/txt_000000/border_CCCCCC/columns_8/maxflags_250/viewers_0/labels_1/pageviews_1/flags_0/percent_0/" />
</a>
</div>

<footer>
<img src="images/logo church.jpg" class="footer-logo">

</footer>

<script>
const texts={
th:{home:"หน้าแรก",about:"เกี่ยวกับ",schedule:"ตาราง",news:"ข่าว",contact:"ติดต่อ",contact_title:"ติดต่อเรา",send:"ส่ง"},
en:{home:"Home",about:"About",schedule:"Schedule",news:"News",contact:"Contact",contact_title:"Contact Us",send:"Send"},
id:{home:"Beranda",about:"Tentang",schedule:"Jadwal",news:"Berita",contact:"Kontak",contact_title:"Hubungi",send:"Kirim"},
my:{home:"ပင်မ",about:"အကြောင်း",schedule:"အချိန်ဇယား",news:"သတင်း",contact:"ဆက်သွယ်ရန်",contact_title:"ဆက်သွယ်ရန်",send:"ပို့"}
};

function setLang(l){
localStorage.setItem("lang",l);
document.querySelectorAll("[data-lang]").forEach(e=>{
e.innerText=texts[l][e.dataset.lang];
});
}

function sendLine(e){
e.preventDefault();
let text = `ชื่อ:${name.value}\nEmail:${email.value}\n${msg.value}`;
window.open("https://lin.ee/nBhkWUu?text="+encodeURIComponent(text));
}

window.onload=()=>{
let lang=navigator.language.slice(0,2);
if(!texts[lang]) lang="th";
setLang(lang);
};
</script>

</body>
</html>
