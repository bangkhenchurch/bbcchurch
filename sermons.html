<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bangkhen Baptist Church</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #121212; color: #eeeeee; font-family: 'Sarabun', sans-serif; line-height: 1.6; }
        .navbar { width: 100%; background: #0a2c6d; padding: 15px 5%; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 1000; }
        .navbar img { width: 35px; border-radius: 50%; }
        
        /* เมนูหลัก */
        .horizontal-menu { 
            background: #1e1e1e; padding: 10px 5%; display: flex; justify-content: center; 
            gap: 10px; flex-wrap: wrap; border: 1px solid #333; max-width: 1200px; 
            margin: 20px auto; border-radius: 50px; 
        }
        .horizontal-menu a { padding: 10px 20px; color: #ccc; text-decoration: none; font-family: 'Prompt'; border-radius: 25px; transition: 0.3s; font-size: 15px; }
        .horizontal-menu a:hover { background: #2c2c2c; color: #fff; }
        .active-page { background: #4dabff !important; color: white !important; }

        .container { padding: 20px 5%; width: 100%; max-width: 1200px; margin: auto; }
        .header-box { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; border-left: 5px solid #4dabff; padding-left: 15px; }
        .section-title { font-family: 'Prompt'; font-size: 26px; color: #fff; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* Card Design */
        .card { background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #333; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; height: 100%; }
        .card:hover { transform: translateY(-5px); border-color: #4dabff; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .card img { width: 100%; height: 180px; object-fit: cover; background: #2a2a2a; }
        .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-family: 'Prompt'; font-size: 18px; margin-bottom: 8px; color: #fff; line-height: 1.4; }
        .card-info { font-size: 13px; color: #bbb; margin-bottom: 10px; }
        .card-meta { font-size: 12px; color: #777; border-top: 1px solid #333; padding-top: 10px; margin-top: auto; display: flex; justify-content: space-between; }

        @media (max-width: 768px) { .horizontal-menu { border-radius: 15px; margin: 10px; padding: 15px; } .section-title { font-size: 20px; } }
    </style>
</head>
<body>

<nav class="navbar">
    <img src="logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3504/3504000.png'">
    <span style="font-family:'Prompt'; font-weight: 600;">Bangkhen Baptist Church</span>
</nav>

<nav class="horizontal-menu" id="mainMenu">
    <a href="index.html">🏠 หน้าแรก</a>
    <a href="sermons.html" id="link-sermons">🎙️ คำเทศนา</a>
    <a href="blogs.html" id="link-blogs">📖 บทความ</a>
    <a href="testimony.html" id="link-testimony">🙏 คำพยาน</a>
    <a href="news.html" id="link-news">📢 ข่าวสาร</a>
    <a href="contact.html">📞 ติดต่อเรา</a>
</nav>

<div class="container">
    <div class="header-box">
        <h2 id="pageTitle" class="section-title">กำลังโหลด...</h2>
    </div>
    <div id="contentGrid" class="grid-container">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
        authDomain: "bbcchurch-6ffc3.firebaseapp.com",
        projectId: "bbcchurch-6ffc3",
        storageBucket: "bbcchurch-6ffc3.appspot.com",
        appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- ระบบตรวจจับหมวดหมู่อัตโนมัติจากชื่อไฟล์ ---
    const fileName = window.location.pathname.split('/').pop();
    let categoryKeyword = "";
    let displayTitle = "";

    if (fileName.includes("blogs")) { 
        categoryKeyword = "บทความ"; displayTitle = "📖 บทความหนุนใจทั้งหมด"; 
        document.getElementById('link-blogs').classList.add('active-page');
    } else if (fileName.includes("testimony")) { 
        categoryKeyword = "พยาน"; displayTitle = "🙏 คำพยานชีวิตทั้งหมด"; 
        document.getElementById('link-testimony').classList.add('active-page');
    } else if (fileName.includes("sermons")) { 
        categoryKeyword = "เทศนา"; displayTitle = "🎙️ คำเทศนาทั้งหมด"; 
        document.getElementById('link-sermons').classList.add('active-page');
    } else if (fileName.includes("news")) { 
        categoryKeyword = "ข่าวสาร"; displayTitle = "📢 ข่าวสารและประกาศ"; 
        document.getElementById('link-news').classList.add('active-page');
    }

    document.getElementById('pageTitle').innerText = displayTitle;

    // --- ดึงข้อมูลจาก Firebase ---
    const q = query(collection(db, "articles"), orderBy("displayDate", "desc"));

    onSnapshot(q, (snap) => {
        const container = document.getElementById('contentGrid');
        container.innerHTML = "";
        let count = 0;

        snap.forEach(doc => {
            const d = doc.data();
            const cat = d.category || "";

            // ถ้าหมวดหมู่ใน Firebase ตรงกับหน้าเว็บนี้
            if (cat.includes(categoryKeyword)) {
                count++;
                const card = `
                <div class="card" onclick="location.href='article.html?id=${doc.id}'">
                    <img src="${d.thumbUrl || 'logo.png'}" onerror="this.src='logo.png'">
                    <div class="card-content">
                        <h4 class="card-title">${d.title || 'ไม่มีหัวข้อ'}</h4>
                        <div class="card-info">โดย: ${d.authorName || d.author || "คริสตจักร"}</div>
                        <div class="card-meta">
                            <span>📅 ${d.displayDate || ''}</span>
                            <span style="color:#4dabff">อ่านต่อ...</span>
                        </div>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', card);
            }
        });

        if (count === 0) {
            container.innerHTML = "<p style='color:#888;'>ไม่พบข้อมูลในหมวดหมู่ชุดนี้</p>";
        }
    });
</script>
</body>
</html>
