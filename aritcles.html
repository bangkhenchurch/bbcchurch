<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บทความ</title>

<style>
body{font-family:sans-serif;background:#eef2f7;padding:20px;}
.box{background:white;padding:20px;border-radius:12px;max-width:800px;margin:auto;}
img{width:100%;border-radius:10px;margin:10px 0;}
h1{color:#0a2c6d;}
.meta{margin:5px 0;}
.star{color:gold;font-size:20px;}
.back{
  display:inline-block;
  margin-bottom:15px;
  background:#0a2c6d;
  color:white;
  padding:8px 12px;
  border-radius:8px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

  <!-- 🔙 ปุ่มกลับ -->
  <a href="index.html" class="back">← กลับหน้าแรก</a>

  <h1 id="title"></h1>

  <p id="author" class="meta"></p>
  <p id="bible" class="meta" style="color:#0a2c6d;"></p>
  <p id="date" class="meta" style="color:gray;"></p>

  <div id="rating" class="star"></div>

  <img id="image">

  <p id="content"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
  authDomain: "bbcchurch-6ffc3.firebaseapp.com",
  projectId: "bbcchurch-6ffc3",
  storageBucket: "bbcchurch-6ffc3.appspot.com",
  messagingSenderId: "1007626508012",
  appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ดึง id จาก URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
  document.body.innerHTML = "<h2>ไม่พบบทความ (ไม่มี ID)</h2>";
  throw new Error("Missing ID");
}

async function loadArticle(){
  try{
    const ref = doc(db,"articles",id);
    const snap = await getDoc(ref);

    if(!snap.exists()){
      document.body.innerHTML = "<h2>ไม่พบบทความ</h2>";
      return;
    }

    const data = snap.data();

    // TITLE
    document.getElementById("title").innerText = data.title || "";

    // AUTHOR
    document.getElementById("author").innerText =
      "ผู้เขียน: " + (data.author || "ไม่ระบุ");

    // BIBLE
    document.getElementById("bible").innerText =
      data.bibleVerse ? "ข้อพระคัมภีร์: " + data.bibleVerse : "";

    // DATE (📅 format สวย)
    if(data.createdAt?.toDate){
      const d = data.createdAt.toDate();
      document.getElementById("date").innerText =
        "วันที่: " + d.toLocaleDateString("th-TH", {
          year: "numeric",
          month: "long",
          day: "numeric"
        });
    }

    // IMAGE
    document.getElementById("image").src =
      data.image || "https://via.placeholder.com/600";

    // CONTENT
    document.getElementById("content").innerText =
      data.content || "";

    // ⭐ RATING
    const stars = "⭐".repeat(data.rating || 0);
    document.getElementById("rating").innerText = stars;

  }catch(err){
    console.error(err);
    document.body.innerHTML = "<h2>โหลดบทความไม่สำเร็จ</h2>";
  }
}

loadArticle();
</script>

</body>
</html>
