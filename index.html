<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bangkhen Baptist Church</title>
<link rel="icon" href="logo.png">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  overflow-x: hidden;
  background: #eef2f7;
  font-family: sans-serif;
}

/* รูปกันล้น */
img {
  max-width: 100%;
  height: auto;
  display: block;
}

/* NAVBAR */
.navbar {
  background: #0a2c6d;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
}

.nav-menu {
  display: flex;
  gap: 15px;
  font-size: 14px;
}

.nav-menu a {
  color: white;
  text-decoration: none;
}

/* HERO */
.hero {
  position: relative;
  width: 100%;
  height: 60vh; /* 🔥 ลดจาก 100vh */
  min-height: 300px;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0;
  transition: 1s;
}

.slide.active {
  opacity: 1;
}

.hero h1 {
  font-size: 28px;
  background: rgba(0,0,0,0.4);
  padding: 10px 16px;
  border-radius: 10px;
}

/* INFO */
.info {
  background: white;
  padding: 20px;
  text-align: center;
  line-height: 1.8;
}

.info h2 {
  color: #0a2c6d;
}

/* MAIN */
.main-section {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 15px;
  padding: 15px;
}

.left, .right {
  background: white;
  padding: 15px;
  border-radius: 12px;
}

/* POST */
.post {
  background: #fff;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  cursor: pointer;
}

/* DASHBOARD */
.dashboard {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: #dbe7f5;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
}

.card .num {
  font-size: 26px;
  font-weight: bold;
}

/* FORM */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.box {
  background: #dbe7f5;
  padding: 12px;
  border-radius: 12px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #2e7d32;
  color: white;
  padding: 10px;
  border: none;
  width: 100%;
  border-radius: 8px;
}

/* ROW */
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

/* FOOTER */
footer {
  background: #0a2c6d;
  color: white;
  text-align: center;
  padding: 20px;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.lightbox img {
  max-width: 95%;
  max-height: 95%;
  object-fit: contain;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .hero {
    height: 45vh;
  }

  .main-section {
    grid-template-columns: 1fr;
  }

  .dashboard {
    grid-template-columns: 1fr;
  }

  .container {
    grid-template-columns: 1fr;
  }

  .row {
    grid-template-columns: 1fr;
  }

  .nav-menu {
    display: none;
  }
}

</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="logo.png" style="width:35px;border-radius:50%;">
    Bangkhen Baptist Church
  </div>

  <div class="nav-menu">
    <a href="#home">หน้าแรก</a>
    <a href="#news">ข่าว</a>
    <a href="#articles">บทความ</a>
    <a href="#contact">ติดต่อ</a>
  </div>
</div>

<!-- HERO -->
<div class="hero" id="home">

  <div class="slide active" style="background-image:url('hero_01.png')"></div>

  <div class="slide" style="background-image:url('hero_02.png')"></div>

  <div class="slide" style="background-image:url('hero_03.png')"></div>

  <div class="slide" style="background-image:url('hero_04.png')"></div>

</div>

<!-- INFO -->
<div class="info">
  <h2>ยินดีต้อนรับ คริสตจักรแบ๊บติสต์บางเขน</h2>
  <p>เวลา นมัสการ 9.00 - 12.00</p>
</div>

<!-- CONTENT -->
<div class="main-section">
  <div class="left">
    <h2>📰 ข่าวสาร</h2>
    <div id="news"></div>
  </div>

  <div class="right">
    <h2>📚 บทความ</h2>
    <div id="articles"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card"><h3>ผู้ลงทะเบียน</h3><div class="num" id="total">0</div></div>
  <div class="card"><h3>นมัสการ</h3><div class="num" id="worship">0</div></div>
  <div class="card"><h3>ศึกษาพระคัมภีร์</h3><div class="num" id="study">0</div></div>
</div>

<!-- FORM -->
<div class="container" id="contact">

  <div class="box">
    <h3>ติดต่อ / ลงทะเบียน</h3>
    <form id="form">
      <input name="fullname" placeholder="ชื่อ">
      <input name="phone" placeholder="เบอร์">
      <textarea name="address" placeholder="ที่อยู่"></textarea>
      <button>ส่งข้อมูล</button>
    </form>
  </div>

  <div class="box">
    <h3>LINE QR</h3>
    <img src="line-qr.png" style="width:140px;margin:auto;">
  </div>

</div>

<!-- ROW -->
<div class="row">
  <div class="card">
    <img src="https://s01.flagcounter.com/count2/M2Js/bg_EEF277/txt_000000/border_CCCCCC/columns_8/maxflags_250/viewers_0/labels_1/pageviews_1/flags_0/percent_0/">
  </div>

  <div class="card">
    <h3>📊 Live Dashboard</h3>
  </div>
</div>

<footer>
  <img src="logo.png" width="60"><br>
  Bangkhen Baptist Church
</footer>

<!-- LIGHTBOX (สำคัญ ต้องอยู่นอก script) -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
  authDomain: "bbcchurch-6ffc3.firebaseapp.com",
  projectId: "bbcchurch-6ffc3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SLIDE */
let i = 0;
setInterval(() => {
  const slides = document.querySelectorAll(".slide");
  slides.forEach(s => s.classList.remove("active"));
  i = (i + 1) % slides.length;
  slides[i].classList.add("active");
}, 4000);

/* LIGHTBOX */
window.openLightbox = (src) => {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").style.display = "flex";
};

window.closeLightbox = () => {
  document.getElementById("lightbox").style.display = "none";
};

/* LOAD DATA */
async function loadAll() {

  const newsBox = document.getElementById("news");
  const articleBox = document.getElementById("articles");

  const snap = await getDocs(collection(db, "articles"));

  let newsHTML = "";
  let articleHTML = "";

  snap.forEach(d => {
    const data = d.data();

    const card = `
      <div class="post">

        <h3>${data.title || ""}</h3>
        <p>${data.author || ""}</p>

        ${data.image ? `<img src="/${data.image}" onclick="openLightbox('/${data.image}')">` : ""}

        <p>${(data.content || "").substring(0,100)}...</p>

      </div>
    `;

    if ((data.category || "").includes("ข่าว")) {
      newsHTML += card;
    } else {
      articleHTML += card;
    }
  });

  newsBox.innerHTML = newsHTML;
  articleBox.innerHTML = articleHTML;
}

loadAll();

</script>

</body>
</html>
