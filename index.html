<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BangKhen Baptist Church</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('church-bg.jpg') center/cover fixed;
      color: #fff;
    }

    .overlay {
      background: rgba(0,0,0,0.65);
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 20px;
    }

    header h1 {
      font-size: 2.2rem;
      letter-spacing: 1px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 12px;
      margin: 15px 0;
      backdrop-filter: blur(6px);
    }

    /* FLAG COUNTER STYLE (BLACK BOX FIX) */
    .flag {
      background: #000;
      padding: 10px;
      border-radius: 10px;
      display: inline-block;
      margin: 10px 0;
    }

    .flag img {
      max-width: 100%;
      filter: contrast(1.2) brightness(1.1);
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }

    .footer-logo {
      width: 60px;
      border-radius: 50%;
      display: block;
      margin: auto;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: gold;
      font-weight: bold;
      cursor: pointer;
    }

    nav {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    nav button {
      width: auto;
      padding: 8px 12px;
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
  </style>
</head>
<body>

<div class="overlay">

  <header>
    <h1 data-lang="title">BangKhen Baptist Church</h1>
    <p data-lang="subtitle">สถานที่นมัสการและครอบครัวแห่งความเชื่อ</p>
  </header>

  <nav>
    <button onclick="setLang('th')">TH</button>
    <button onclick="setLang('en')">EN</button>
  </nav>

  <!-- FLAG COUNTER -->
  <div class="flag">
    <a href="https://info.flagcounter.com/KQe9">
      <img src="https://s01.flagcounter.com/count2/KQe9/bg_FFFFFF/txt_000000/border_CCCCCC/columns_8/maxflags_250/viewers_0/labels_1/pageviews_1/flags_0/percent_0/" />
    </a>
  </div>

  <!-- WORSHIP SCHEDULE -->
  <div class="card">
    <h1 data-lang="worship_title">ตารางนมัสการ</h1>
    <p>วันอาทิตย์: 09:00</p>
    <p>วันพุธ: 19:00</p>
  </div>

  <!-- ANNOUNCEMENTS -->
  <div class="card">
    <h1>ประกาศข่าว</h1>
    <p>📢 ยินดีต้อนรับทุกท่านสู่นมัสการพระเจ้า</p>
  </div>

  <!-- EVENTS -->
  <div class="card">
    <h1>กิจกรรมประจำเดือน</h1>
    <div id="events"></div>
  </div>

  <!-- CONTACT FORM -->
  <div class="card">
    <h1 data-lang="contact_title">ติดต่อเรา</h1>

    <p>📞 02-5798764</p>
    <p>📧 bbc_bangkok@gmail.com</p>

    <form onsubmit="sendLine(event)">
      <input id="name" placeholder="ชื่อ" required>
      <input id="email" placeholder="email" required>
      <textarea id="msg" placeholder="ข้อความ" required></textarea>
      <button type="submit" data-lang="send">ส่งข้อความ</button>
    </form>
  </div>

  <footer>
    <img src="logo church.jpg" class="footer-logo">
    © 2026 BangKhen Baptist Church Website
  </footer>

</div>

<script>

// LANGUAGE SYSTEM
const texts = {
  th: {
    title: "คริสต์จักรแบ๊บติสต์บางเขน",
    subtitle: "สถานที่นมัสการและครอบครัวแห่งความเชื่อ",
    contact_title: "ติดต่อเรา",
    send: "ส่งข้อความ",
    worship_title: "ตารางนมัสการ"
  },
  en: {
    title: "BangKhen Baptist Church",
    subtitle: "A place of worship and faith family",
    contact_title: "Contact Us",
    send: "Send Message",
    worship_title: "Worship Schedule"
  }
};

function setLang(lang) {
  document.querySelectorAll('[data-lang]').forEach(el => {
    const key = el.getAttribute('data-lang');
    if(texts[lang][key]) el.innerText = texts[lang][key];
  });
}

// LINE GROUP SEND (requires backend)
function sendLine(event) {
  event.preventDefault();

  const data = {
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    msg: document.getElementById('msg').value
  };

  alert("ต้องเชื่อม Backend / LINE Messaging API เพื่อส่งเข้ากลุ่ม");

  console.log(data);
}
