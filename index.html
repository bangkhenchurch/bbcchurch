<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คริสตจักรแบ๊บติสต์บางเขน</title>
<link rel="icon" type="image/png" href="logo.png">

<style>

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
}

/* NAV */
nav {
  background: #0b3d91;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  color: white;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 90vh;
  background: url('https://images.unsplash.com/photo-1507692049790-de58290a4334') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

/* SECTION */
.section {
  padding: 50px 20px;
  text-align: center;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  margin: 10px;
  border-radius: 12px;
}

/* FORM */
form {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: left;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0 15px;
}

/* ⭐ FIX CHECKBOX (สำคัญมาก) */
.check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 8px 0;
  cursor: pointer;
}

.check-item input {
  width: auto;
  margin: 0;
  transform: scale(1.2);
}

/* BUTTON */
button {
  width: 100%;
  padding: 10px;
  background: #0b3d91;
  color: white;
  border: none;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>คริสตจักรแบ๊บติสต์บางเขน</div>
  <div>
    <a href="#home">หน้าแรก</a>
    <a href="#about">เกี่ยวกับ</a>
    <a href="#service">ตารางนมัสการ</a>
    <a href="#news">ข่าวสาร</a>
    <a href="#contact">ติดต่อ</a>
  </div>
</nav>

<!-- HERO -->
<div id="home" class="hero">
  <div>
    <h1>ยินดีต้อนรับ</h1>
    <p>พระเจ้าทรงรักคุณเสมอ ❤️</p>
  </div>
</div>

<!-- ABOUT -->
<div id="about" class="section">
  <h2>เกี่ยวกับคริสตจักร</h2>
  <p>เราคือชุมชนแห่งความรัก ความหวัง และความเชื่อ</p>
</div>

<!-- SERVICE -->
<div id="service" class="section">
  <h2>เวลานมัสการ</h2>
  <div class="card">วันอาทิตย์ 09:00 - 11:30</div>
  <div class="card">อธิษฐาน วันพุธ 19:00</div>
</div>

<!-- NEWS -->
<div id="news" class="section">
  <h2>ข่าวสาร</h2>
  <div class="card">ค่ายคริสตจักร</div>
</div>

<!-- CONTACT + FORM -->
<div id="contact" class="section">

<h2>ติดต่อเรา / กรอกข้อมูล</h2>

<form id="contactForm">

  <label>1. ชื่อ-นามสกุล</label>
  <input type="text" name="fullname" required>

  <label>2. เบอร์โทร</label>
  <input type="tel" name="phone" required>

  <label>3. ที่อยู่</label>
  <textarea name="address"></textarea>

  <label>4. ไอดีไลน์</label>
  <input type="text" name="lineid">

  <label>5. ความต้องการ</label>

  <!-- ⭐ FIXED CHECKBOX ALIGN -->
  <label class="check-item">
    <input type="checkbox" name="request1">
    <span>ต้องการไปร่วมนมัสการพระเจ้าที่คริสตจักร</span>
  </label>

  <label class="check-item">
    <input type="checkbox" name="request2">
    <span>ต้องการศึกษาพระคัมภีร์ที่บ้าน</span>
  </label>

  <button type="submit">ส่งข้อมูล</button>

</form>

</div>

<!-- SCRIPT SEND -->
<script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = {
    fullname: this.fullname.value,
    phone: this.phone.value,
    address: this.address.value,
    lineid: this.lineid.value,
    request1: this.request1.checked,
    request2: this.request2.checked
  };

  try {
    const res = await fetch("http://localhost:3000/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.success) {
      alert("ส่งข้อมูลสำเร็จ ✔");
      this.reset();
    } else {
      alert("ส่งไม่สำเร็จ ❌");
    }

  } catch (err) {
    alert("Server ไม่ตอบสนอง ❌");
  }
});
</script>

</body>
</html>
