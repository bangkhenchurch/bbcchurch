<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bangkhen Baptist Church</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #eef2f7;
  font-family: sans-serif;
  overflow-x: hidden;
}

/* IMAGE SAFE */
img {
  max-width: 100%;
  height: auto;
  display: block;
}

/* NAV */
.navbar {
  background: #0a2c6d;
  color: white;
  display: flex;
  justify-content: space-between;
  padding: 12px 16px;
}

.nav-menu {
  display: flex;
  gap: 15px;
}

.nav-menu a {
  color: white;
  text-decoration: none;
}

/* HERO FIX */
.hero {
  position: relative;
  width: 100%;
  height: 60svh;
  max-height: 420px;
  min-height: 260px;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: 1s;
}

.slide.active {
  opacity: 1;
}

/* INFO */
.info {
  background: white;
  padding: 20px;
  text-align: center;
}

.info h2 {
  color: #0a2c6d;
}

/* MAIN */
.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 15px;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 12px;
}

/* POST */
.post {
  background: #fff;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* MOBILE */
@media (max-width: 768px) {
  .hero {
    height: 38vh;
  }

  .main {
    grid-template-columns: 1fr;
  }

  .nav-menu {
    display: none;
  }
}

</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div>🏠 Bangkhen Baptist Church</div>
  <div class="nav-menu">
    <a href="#news">ข่าว</a>
    <a href="#articles">บทความ</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">

  <div class="slide active" style="background-image:url('hero_01.png')"></div>
  <div class="slide" style="background-image:url('hero_02.png')"></div>
  <div class="slide" style="background-image:url('hero_03.png')"></div>
  <div class="slide" style="background-image:url('hero_04.png')"></div>

</div>

<!-- INFO -->
<div class="info">
  <h2>ยินดีต้อนรับ คริสตจักรแบ๊บติสต์บางเขน</h2>
  <p>เวลา นมัสการ 9.00 - 12.00</p>
</div>

<!-- MAIN -->
<div class="main">

  <!-- NEWS -->
  <div class="box">
    <h2>📰 ข่าวสาร</h2>
    <div id="news"></div>
  </div>

  <!-- ARTICLES -->
  <div class="box">
    <h2>📚 บทความ</h2>
    <div id="articles"></div>
  </div>

</div>

<script>
/* SLIDE */
let i = 0;
setInterval(() => {
  const slides = document.querySelectorAll(".slide");
  slides.forEach(s => s.classList.remove("active"));
  i = (i + 1) % slides.length;
  slides[i].classList.add("active");
}, 4000);

/* 🔥 FIX: กันข้อมูลหาย (fallback demo) */
document.getElementById("news").innerHTML = `
  <div class="post">📢 ข่าวตัวอย่าง 1</div>
  <div class="post">📢 ข่าวตัวอย่าง 2</div>
`;

document.getElementById("articles").innerHTML = `
  <div class="post">📖 บทความตัวอย่าง 1</div>
  <div class="post">📖 บทความตัวอย่าง 2</div>
`;
</script>

</body>
</html>
