<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bangkhen Baptist Church</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">

<style>
/* 1. คุมโทนสีและพื้นฐาน */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  max-width: 100vw;
  overflow-x: hidden !important;
  background: #121212;
  color: #eeeeee;
  font-family: 'Sarabun', sans-serif;
}

/* 2. Navbar */
.navbar {
  width: 100%;
  background: #0a2c6d;
  padding: 15px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 1000;
}
.navbar img { width: 35px; border-radius: 50%; }

/* 3. Hero Slideshow */
.hero-container { width: 100%; background: #000; overflow: hidden; line-height: 0; }
.slide { width: 100%; display: none; }
.slide.active { display: block; }
.slide img { width: 100%; height: auto; display: block; }

/* 4. รายการบทความ (Section Divider) */
.container { padding: 15px; width: 100%; }
.section-title {
  font-family: 'Prompt';
  font-size: 22px;
  margin: 20px 0;
  color: #ffffff;
  border-left: 5px solid #4dabff;
  padding-left: 12px;
}

/* 5. การแบ่ง Section ภายในแต่ละบทความ */
.article-card {
  background: #1e1e1e;
  border-radius: 16px;
  margin-bottom: 25px;
  overflow: hidden;
  display: block;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  border: 1px solid #333;
}

/* --- Section: รูปภาพปก --- */
.section-image {
  width: 100%;
  height: 220px;
  background: #2a2a2a;
}
.section-image img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* บังคับรูปให้พอดีกรอบไม่เบี้ยว */
}

/* --- Section: เนื้อหา --- */
.section-content {
  padding: 20px;
}
.section-content h2 { 
  color: #4dabff; 
  font-family: 'Prompt'; 
  font-size: 20px; 
  margin-bottom: 12px; 
}
.section-content p { 
  font-size: 15px; 
  color: #bbbbbb; 
  line-height: 1.6; 
  display: -webkit-box;
  -webkit-line-clamp: 2; /* แสดงแค่ 2 บรรทัดแล้วตัด */
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* --- Section: ข้อมูลท้ายบทความ (Rating & Read More) --- */
.section-footer {
  padding: 12px 20px;
  background: #252525;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid #333;
}
.rating-stars { color: gold; font-size: 16px; }
.btn-read { 
  background: #0a2c6d; 
  color: #fff; 
  padding: 6px 15px; 
  border-radius: 20px; 
  font-size: 13px; 
  font-weight: bold;
}

/* 6. Dashboard & Footer */
.dashboard { display: flex; gap: 10px; margin-top: 20px; }
.stat-box {
  flex: 1; background: #1e1e1e; padding: 15px 5px;
  border-radius: 12px; text-align: center; border-bottom: 3px solid #0a2c6d;
}
footer { background: #0a2c6d; color: white; text-align: center; padding: 40px 20px; margin-top: 30px; }
footer img { width: 60px; border-radius: 50%; margin-bottom: 10px; }
</style>
</head>

<body>

<nav class="navbar">
  <img src="logo.png">
  <span style="font-family:'Prompt';">Bangkhen Baptist Church</span>
</nav>

<div class="hero-container">
  <div class="slide active"><img src="hero_01.png"></div>
  <div class="slide"><img src="hero_02.png"></div>
  <div class="slide"><img src="hero_03.png"></div>
</div>

<div class="container">
  <h2 class="section-title">รายการบทความล่าสุด</h2>
  
  <!-- รายการบทความที่แบ่ง Section เรียบร้อยแล้ว -->
  <div id="article-list">
    <p style="text-align:center; padding: 30px; color:#888;">กำลังโหลดบทความ...</p>
  </div>

  <div class="dashboard">
    <div class="stat-box"><span>ผู้ลงทะเบียน</span><strong>1,250</strong></div>
    <div class="stat-box"><span>นมัสการ</span><strong>450</strong></div>
    <div class="stat-box"><span>ศึกษา</span><strong>85</strong></div>
  </div>
</div>

<footer>
  <img src="logo.png"><br>
  <strong>@2026 Bangkhen Baptist Church</strong>
  <p style="font-size: 12px; opacity: 0.7; margin-top:10px;">ร่วมนมัสการ เวลา 9.00 am - 12.00 pm</p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
    authDomain: "bbcchurch-6ffc3.firebaseapp.com",
    projectId: "bbcchurch-6ffc3",
    storageBucket: "bbcchurch-6ffc3.appspot.com",
    messagingSenderId: "1007626508012",
    appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const articleList = document.getElementById('article-list');
  const q = query(collection(db, "articles"), orderBy("createdAt", "desc"), limit(10));

  onSnapshot(q, (snapshot) => {
    articleList.innerHTML = "";
    if (snapshot.empty) {
      articleList.innerHTML = "<p style='text-align:center; color:#666;'>ยังไม่มีบทความในขณะนี้</p>";
      return;
    }

    snapshot.forEach((doc) => {
      const data = doc.data();
      const id = doc.id;
      
      // ดึงค่ารูปภาพ (เช็คทั้ง image และ imageUrl)
      const displayImage = data.image || data.imageUrl || 'https://via.placeholder.com/600x300/222/4dabff?text=Bangkhen+Baptist';
      const starIcons = "⭐".repeat(data.rating || 0);

      articleList.innerHTML += `
        <a href="article.html?id=${id}" class="article-card">
          <!-- Section 1: Image -->
          <div class="section-image">
            <img src="${displayImage}" alt="cover">
          </div>
          
          <!-- Section 2: Content -->
          <div class="section-content">
            <h2>${data.title || 'ไม่มีหัวข้อ'}</h2>
            <p>${data.content || 'คลิกเพื่ออ่านรายละเอียดเพิ่มเติม...'}</p>
          </div>
          
          <!-- Section 3: Footer Information -->
          <div class="section-footer">
            <div class="rating-stars">${starIcons} <span style="color:#888; font-size:12px;">(${data.rating || 0}/5)</span></div>
            <div class="btn-read">อ่านบทความ</div>
          </div>
        </a>
      `;
    });
  });

  // Slideshow Logic
  let cur = 0;
  const slides = document.querySelectorAll('.slide');
  setInterval(() => {
    if(slides.length < 2) return;
    slides[cur].classList.remove('active');
    cur = (cur + 1) % slides.length;
    slides[cur].classList.add('active');
  }, 5000);
</script>

</body>
</html>
