<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คริสตจักรแบ๊บติสต์บางเขน</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Sarabun', sans-serif; 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            overflow-x: hidden; 
        }

        /* 1. แถบบนสุด */
        .header { display: flex; align-items: center; padding: 10px; background: #111; width: 100%; }
        .header img { width: 35px; margin-right: 10px; }

        /* 2. เมนูเลื่อนตามหน้าจอ (Sticky) */
        .menu-bar { 
            display: flex; 
            justify-content: space-around; 
            background: #222; 
            padding: 10px 5px; 
            width: 100%;
            position: sticky; /* ทำให้เมนูเกาะติด */
            top: 0;           /* เกาะติดที่ตำแหน่งบนสุด */
            z-index: 1000;    /* ให้เมนูอยู่เหนือทุกอย่าง */
            border-bottom: 1px solid #333;
        }
        .menu-bar a { color: #fff; text-decoration: none; font-size: 13px; white-space: nowrap; padding: 0 5px; }

        /* 3. Hero Slideshow */
        .hero { width: 100%; height: 200px; background: #333; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }

        /* 4. Layout หลัก */
        .container { width: 100%; padding: 10px; }
        .box { background: #1a1a1a; padding: 15px; margin-bottom: 15px; border: 1px solid #333; width: 100%; }

        /* 5. Footer */
        .footer { background: #111; padding: 20px; text-align: center; border-top: 1px solid #333; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="Logo">
        <strong>คริสตจักรแบ๊บติสต์บางเขน</strong>
    </div>

    <div class="menu-bar">
        <a href="#">หน้าแรก</a><a href="#">บทความ</a><a href="#">คำพยาน</a>
        <a href="#">คำเทศนา</a><a href="#">ข่าวสาร</a><a href="#">ติดต่อ</a>
    </div>

    <div class="hero">
        <img src="hero_01.png" alt="Hero">
    </div>

    <div class="container">
        <div class="box">
            <h3>🗂️ คลังบทความ</h3>
        </div>

        <div class="box">
            <h3>เนื้อหาหลัก</h3>
        </div>

        <div class="box" style="text-align:center;">
            <p>ให้คะแนนและแสดงความคิดเห็น</p>
            <img src="line-qr.png" style="width:120px;"><br>
            <a href="https://lin.ee/oBnmElM">LINE: @881mreke</a>
            
            <div style="margin-top: 20px;">

                </a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <img src="logo.png" alt="Church Logo" style="width: 80px; display: block; margin: 0 auto 10px;">
        <p>คริสตจักรแบ๊บติสต์บางเขน<br>
        2172/145-147 ซอยพหลโยธิน 36 ถ.พหลโยธิน แขวงลาดยาว เขตจตุจักร กรุงเทพฯ 10900<br>
        โทร.02-5798764<br>@bbcchurch 2026</p>
    </footer>

</body>
</html>
