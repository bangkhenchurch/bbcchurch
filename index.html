<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>คริสตจักรแบ๊บติสต์บางเขน</title>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow-x: hidden;
  }

  /* NAV - ทำให้โปร่งใสและลอยทับรูป */
  nav {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    display: flex;
    justify-content: center;
    padding: 20px 10px;
  }

  nav a {
    color: white;
    text-decoration: none;
    margin: 0 10px;
    font-size: 14px;
    opacity: 0.9;
  }

  /* HERO - ปรับให้เต็มจอ 100% */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh; /* ความสูงเต็มหน้าจอ */
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), 
                url('https://images.unsplash.com/photo-1507692049790-de58290a4334?q=80&w=2070') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .hero h1 {
    font-size: 3rem;
    font-weight: bold;
    margin-bottom: 15px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
  }

  .hero p {
    font-size: 1.2rem;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
  }

  /* ส่วนเนื้อหาด้านล่าง */
  .content-section {
    padding: 60px 25px;
    background: #111;
    text-align: center;
  }

  .card {
    background: #1e1e1e;
    padding: 25px;
    margin: 20px 0;
    border-radius: 15px;
    border: 1px solid #333;
  }

  /* ปรับแต่งฟอร์มให้ดูเต็มจอในมือถือ */
  form {
    max-width: 500px;
    margin: 0 auto;
    text-align: left;
  }

  input, textarea {
    width: 100%;
    padding: 15px;
    margin: 10px 0 20px;
    background: #222;
    border: 1px solid #444;
    color: white;
    border-radius: 10px;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 18px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 16px;
  }

  footer {
    padding: 40px;
    background: #000;
    text-align: center;
    border-top: 1px solid #222;
  }
</style>
</head>

<body>

  <nav>
    <a href="#home">หน้าแรก</a>
    <a href="#about">เกี่ยวกับ</a>
    <a href="#service">ตาราง</a>
    <a href="#contact">ติดต่อ</a>
  </nav>

  <section id="home" class="hero">
    <h1>ยินดีต้อนรับ</h1>
    <p>พระเจ้าทรงรักคุณเสมอ ❤️</p>
  </section>

  <section id="about" class="content-section">
    <h2>เกี่ยวกับคริสตจักร</h2>
    <p style="margin-top:15px; color:#aaa;">เราคือชุมชนแห่งความรัก ความหวัง และความเชื่อ</p>
    
    <div class="card">
      <h3>เวลานมัสการ</h3>
      <p style="margin-top:10px;">วันอาทิตย์ 09:00 - 11:30</p>
    </div>
  </section>

  <section id="contact" class="content-section" style="background: #000;">
    <h2>ติดต่อเรา</h2>
    <form>
      <input type="text" placeholder="ชื่อ-นามสกุล">
      <input type="tel" placeholder="เบอร์โทรศัพท์">
      <textarea rows="4" placeholder="ข้อความหรือที่อยู่"></textarea>
      <button type="button">ส่งข้อมูล</button>
    </form>
  </section>

  <footer>
    <p style="font-size: 12px; color: #555;">© 2026 Bangkhen Baptist Church</p>
  </footer>

</body>
</html>
