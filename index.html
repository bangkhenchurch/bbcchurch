<script>
const texts = {
 th:{home:"หน้าแรก",about:"เกี่ยวกับเรา",schedule:"ตารางนมัสการ",news:"ข่าวสาร",contact:"ติดต่อ",welcome:"ยินดีต้อนรับ",word:"พระคำพระเจ้า",verse:"พระเจ้าทรงเป็นความรัก"},
 en:{home:"Home",about:"About",schedule:"Schedule",news:"News",contact:"Contact",welcome:"Welcome",word:"Word of God",verse:"God is Love"},
 id:{home:"Beranda",about:"Tentang",schedule:"Jadwal",news:"Berita",contact:"Kontak",welcome:"Selamat Datang",word:"Firman Tuhan",verse:"Tuhan adalah Kasih"},
 my:{home:"ပင်မ",about:"အကြောင်း",schedule:"အချိန်ဇယား",news:"သတင်း",contact:"ဆက်သွယ်ရန်",welcome:"ကြိုဆိုပါသည်",word:"ဘုရားနှုတ်ကပတ်",verse:"ဘုရားသည် ချစ်ခြင်းဖြစ်သည်"}
};

function setLang(lang){
 localStorage.setItem("lang",lang);
 document.querySelectorAll("[data-lang]").forEach(el=>{
  el.innerText = texts[lang][el.dataset.lang];
 });
}

window.onload = ()=>{
 let lang = navigator.language.slice(0,2);
 if(!texts[lang]) lang="th";
 setLang(lang);
};
</script>
