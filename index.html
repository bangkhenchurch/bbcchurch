<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คริสตจักรแบ๊บติสต์บางเขน</title>
<link rel="icon" type="image/png" href="logo.png">

<style>

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #000;
  color: #fff;
}

nav {
  background: #0b3d91;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
}

nav a {
  color: white;
  margin: 0 8px;
  text-decoration: none;
}

.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1507692049790-de58290a4334') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

.section {
  padding: 50px 20px;
  text-align: center;
}

.card {
  background: #111;
  padding: 20px;
  margin: 10px;
  border-radius: 12px;
}

form {
  max-width: 500px;
  margin: auto;
  background: #111;
  padding: 20px;
  border-radius: 10px;
  text-align: left;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  background: #000;
  color: #fff;
  border: 1px solid #333;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #0b3d91;
  color: white;
  border: none;
  cursor: pointer;
}

footer {
  background: #0b3d91;
  padding: 20px;
  margin-top: 50px;
}

</style>
</head>

<body>

<nav>
  <div>คริสตจักรแบ๊บติสต์บางเขน</div>
  <div>
    <a href="#home">หน้าแรก</a>
    <a href="#about">เกี่ยวกับ</a>
    <a href="#service">นมัสการ</a>
    <a href="#news">ข่าว</a>
    <a href="#contact">ติดต่อ</a>
  </div>
</nav>

<div id="home" class="hero">
  <div>
    <h1>ยินดีต้อนรับ</h1>
    <p>พระเจ้าทรงรักคุณเสมอ ❤️</p>
  </div>
</div>

<div id="about" class="section">
  <h2>เกี่ยวกับคริสตจักร</h2>
</div>

<div id="service" class="section">
  <h2>เวลานมัสการ</h2>
  <div class="card">อาทิตย์ 09:00 - 11:30</div>
</div>

<div id="news" class="section">
  <h2>ข่าวสาร</h2>
</div>

<!-- 🔥 CONTACT -->
<div id="contact" class="section">
<h2>ติดต่อเรา</h2>

<form id="contactForm">

<input type="text" name="fullname" placeholder="ชื่อ-นามสกุล" required>
<input type="tel" name="phone" placeholder="เบอร์โทร" required>
<textarea name="address" placeholder="ที่อยู่"></textarea>
<input type="text" name="lineid" placeholder="LINE ID">

<!-- 🔥 CHECKBOX -->
<label>
  <input type="checkbox" name="worship">
  ต้องการไปร่วมนมัสการพระเจ้าที่คริสต์จักร
</label>

<br><br>

<label>
  <input type="checkbox" name="study">
  ต้องการเอกสาร เพื่อศึกษาที่บ้าน
</label>

<br><br>

<button type="submit">ส่งข้อมูล</button>

</form>
</div>

<footer>
  <h3 style="text-align:center;">คริสตจักรแบ๊บติสต์บางเขน</h3>
</footer>

<script>

// ✅ ส่งข้อมูลไป server
document.getElementById("contactForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);

  const data = {
    fullname: formData.get("fullname"),
    phone: formData.get("phone"),
    address: formData.get("address"),
    lineid: formData.get("lineid"),
    worship: formData.get("worship") ? true : false,
    study: formData.get("study") ? true : false
  };

  fetch("https://bbcchurch.onrender.com/send", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("ส่งข้อมูลเรียบร้อยแล้ว");
  e.target.reset();
});

</script>

</body>
</html>
