<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bangkhen Baptist Church</title>
<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ================= 1. กฎเหล็กกันล้น (Global CSS) ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box; /* บังคับให้ Padding ไม่ดันความกว้างออก */
}

html, body {
  width: 100%;
  max-width: 100vw; /* บังคับกว้างเท่าหน้าจอเป๊ะๆ */
  overflow-x: hidden !important; /* ตัดส่วนที่แลบออกทิ้งทันที */
  background: #121212; /* พื้นหลังสีดำตามที่คุณชอบ */
  color: #eeeeee;
  font-family: 'Sarabun', sans-serif;
  position: relative;
}

/* ================= 2. NAVBAR ================= */
.navbar {
  width: 100%;
  background: #0a2c6d;
  padding: 15px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.navbar img { width: 35px; border-radius: 50%; }

/* ================= 3. HERO (จุดที่แก้ยากที่สุด) ================= */
.hero {
  position: relative;
  width: 100%;
  height: 40vh; /* กำหนดความสูงพอประมาณ */
  overflow: hidden; /* ล็อครูปข้างในห้ามล้นกรอบ */
  background: #000;
}

.slide {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.slide.active { opacity: 1; }

.slide img {
  /* 🔥 เทคนิคไม้ตาย: object-fit cover จะทำให้รูปฟิตพอดีขอบเสมอ ไม่ว่าหน้าจอจะสั้นหรือยาว */
  width: 100% !important;
  height: 100% !important;
  object-fit: cover; 
  object-position: center;
}

/* ================= 4. DASHBOARD (ส่วนสถิติ) ================= */
.dashboard {
  display: flex; /* ใช้ Flex แทน Grid ในส่วนนี้เพื่อให้หดตัวง่ายขึ้น */
  justify-content: space-around;
  width: 90%;
  max-width: 1000px;
  margin: -25px auto 20px;
  gap: 10px;
  position: relative;
  z-index: 10;
}

.card-stat {
  flex: 1; /* แบ่งพื้นที่เท่ากัน */
  background: #1e1e1e;
  padding: 15px 5px;
  border-radius: 10px;
  text-align: center;
  border-bottom: 3px solid #0a2c6d;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  min-width: 0; /* ป้องกันเนื้อหาดัน Card ล้น */
}

.card-stat strong { display: block; color: #4dabff; font-family: 'Prompt'; }

/* ================= 5. เนื้อหา (Layout) ================= */
.content-section {
  width: 90%;
  max-width: 1100px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* ปรับตามขนาดจออัตโนมัติ */
  gap: 20px;
}

.card {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
  word-wrap: break-word; /* กันตัวอักษรยาวๆ ดันขอบล้น */
}

/* ================= 6. CONTACT & QR ================= */
.contact-container {
  width: 90%;
  max-width: 1100px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  background: #2a2a2a;
  border: 1px solid #333;
  color: white;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 12px;
  background: #2e7d32;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
}

/* ================= 7. FOOTER ================= */
footer {
  background: #0a2c6d;
  padding: 40px 20px;
  text-align: center;
  margin-top: 40px;
}

/* ================= สรุปไม้ตายกันล้นบนมือถือ ================= */
@media (max-width: 600px) {
  .dashboard { width: 95%; gap: 5px; }
  .card-stat { font-size: 12px; }
}
</style>
</head>

<body>

<nav class="navbar">
  <img src="logo.png">
  <span style="font-family:'Prompt';">Bangkhen Baptist Church</span>
</nav>

<div class="hero">
  <div class="slide active"><img src="hero_01.png"></div>
  <div class="slide"><img src="hero_02.png"></div>
  <div class="slide"><img src="hero_03.png"></div>
  <div class="slide"><img src="hero_04.png"></div>
</div>

<div class="dashboard">
  <div class="card-stat"><span>ผู้ลงทะเบียน</span><strong>1,250</strong></div>
  <div class="card-stat"><span>นมัสการ</span><strong>450</strong></div>
  <div class="card-stat"><span>ศึกษา</span><strong>85</strong></div>
</div>

<div class="content-section">
  <div class="card">
    <h3 style="color:#4dabff; margin-bottom:10px;">📰 ข่าวสาร</h3>
    <div id="news" style="color:#888;">ไม่มีข้อมูลข่าวสารใหม่</div>
  </div>
  <div class="card">
    <h3 style="color:#4dabff; margin-bottom:10px;">📚 บทความ</h3>
    <p>"ความเชื่อคือความแน่ใจในสิ่งที่เราหวังไว้..." (ฮีบรู 11:1)</p>
  </div>
</div>

<div class="contact-container">
  <div class="card">
    <h3 style="margin-bottom:10px;">📍 ติดต่อเรา</h3>
    <input placeholder="ชื่อ">
    <input placeholder="เบอร์โทร">
    <textarea placeholder="คำอธิษฐาน" rows="3"></textarea>
    <button>ส่งข้อมูล</button>
  </div>
  <div class="card" style="text-align:center;">
    <h3 style="margin-bottom:10px;">💬 LINE QR Code</h3>
    <img src="line-qr.png" style="max-width:150px; width:100%; height:auto; border-radius:10px;">
  </div>
</div>

<footer>
  <img src="logo.png" width="50" style="border-radius:50%; margin-bottom:10px;"><br>
  <strong>Bangkhen Baptist Church</strong>
</footer>

<script>
  let cur = 0;
  const slides = document.querySelectorAll('.slide');
  function next() {
    if(slides.length < 2) return;
    slides[cur].classList.remove('active');
    cur = (cur + 1) % slides.length;
    slides[cur].classList.add('active');
  }
  setInterval(next, 5000);
</script>

</body>
</html>
