<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คริสตจักรแบ๊บติสต์บางเขน</title>
<link rel="icon" type="image/png" href="logo.png">

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #000;
  color: #fff;
  padding-top: 70px;
}

nav {
  background: #0b3d91;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 999;
}

nav a {
  color: white;
  margin: 0 8px;
  text-decoration: none;
}

.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1507692049790-de58290a4334') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

.section {
  padding: 50px 20px;
  text-align: center;
}

.card {
  background: #111;
  padding: 20px;
  margin: 10px;
  border-radius: 12px;
}

form {
  max-width: 500px;
  margin: auto;
  background: #111;
  padding: 20px;
  border-radius: 10px;
  text-align: left;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  background: #000;
  color: #fff;
  border: 1px solid #333;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #0b3d91;
  color: white;
  border: none;
  cursor: pointer;
}

/* checkbox */
.checkbox-group {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 10px 0;
}

.checkbox-group input {
  width: auto;
  transform: scale(1.2);
}

footer {
  background: #0b3d91;
  padding: 20px;
  margin-top: 50px;
}
</style>
</head>

<body>

<nav>
  <div>คริสตจักรแบ๊บติสต์บางเขน</div>
  <div>
    <a href="#home">หน้าแรก</a>
    <a href="#about">เกี่ยวกับ</a>
    <a href="#service">นมัสการ</a>
    <a href="#news">ข่าว</a>
    <a href="#contact">ติดต่อ</a>
  </div>
</nav>

<div id="home" class="hero">
  <div>
    <h1>ยินดีต้อนรับ</h1>
    <p>พระเจ้าทรงรักคุณเสมอ ❤️</p>
  </div>
</div>
<!-- 🔥 FLAG COUNTER ใต้ HEADER -->
<div style="display:flex; justify-content:center; margin:20px 0;">
  <img src="https://s01.flagcounter.com/count2/M2Js/bg_EEF277/txt_000000/border_CCCCCC/columns_8/maxflags_250/viewers_0/labels_1/pageviews_1/flags_0/percent_0/">
</div>

<div id="about" class="section">
  <h2>เกี่ยวกับคริสตจักร</h2>
</div>

<div id="service" class="section">
  <h2>เวลานมัสการ</h2>
  <div class="card">อาทิตย์ 09:00 - 11:30</div>
</div>

<div id="news" class="section">
  <h2>ข่าวสาร</h2>
</div>

<div id="contact" class="section">
<h2>ติดต่อเรา</h2>

<form id="contactForm">
<input type="text" name="fullname" placeholder="ชื่อ-นามสกุล" required>
<input type="tel" name="phone" placeholder="เบอร์โทร" required>
<textarea name="address" placeholder="ที่อยู่"></textarea>
<input type="text" name="lineid" placeholder="LINE ID">

<div class="checkbox-group">
  <input type="checkbox" id="worship" name="worship">
  <label for="worship">ต้องการไปร่วมนมัสการพระเจ้าที่คริสต์จักร</label>
</div>

<div class="checkbox-group">
  <input type="checkbox" id="study" name="study">
  <label for="study">ต้องการศึกษาพระคัมภีร์ที่บ้าน</label>
</div>

<button type="submit">ส่งข้อมูล</button>
</form>
</div>

<!-- 🔥 FLAG COUNTER เหนือ FOOTER -->
<div style="display:flex; justify-content:center; margin:20px 0;">
  <img src="https://s01.flagcounter.com/count2/M2Js/bg_EEF277/txt_000000/border_CCCCCC/columns_8/maxflags_250/viewers_0/labels_1/pageviews_1/flags_0/percent_0/">
</div>

<footer>
  <h3 style="text-align:center;">คริสตจักรแบ๊บติสต์บางเขน</h3>
</footer>

<script>
document.getElementById("contactForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);

  const data = {
    fullname: formData.get("fullname"),
    phone: formData.get("phone"),
    address: formData.get("address"),
    lineid: formData.get("lineid"),
    worship: formData.get("worship") ? true : false,
    study: formData.get("study") ? true : false
  };

  try {
    const res = await fetch("https://bbcchurch.onrender.com/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();

    if (res.ok) {
      alert("✅ ส่งข้อมูลเรียบร้อยแล้ว");
      e.target.reset();
    } else {
      alert("❌ ส่งไม่สำเร็จ: " + text);
    }

  } catch (err) {
    alert("❌ ติดต่อ server ไม่ได้");
  }
});
</script>

</body>
</html>
