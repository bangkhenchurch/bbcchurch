<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangkhen Baptist Church</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#000;
  color:#fff;
}

/* NAV */
nav {
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  z-index:999;
}

/* HERO (🔥 ไฮไลท์หลัก) */
.hero {
  height:100vh;
  position:relative;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1507692049790-de58290a4334')
    center/cover no-repeat;
}

/* TEXT OVERLAY */
.hero-text {
  position:absolute;
  bottom:15%;
  left:10%;
  max-width:600px;
}

.hero-text h1 {
  font-size:60px;
  margin:0;
  line-height:1.2;
}

.hero-text p {
  font-size:20px;
  opacity:0.9;
  margin-top:10px;
}

/* SECTION */
.section {
  padding:80px 20px;
  text-align:center;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap:20px;
}

.card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.card p {
  padding:15px;
}

/* FLAG */
.flag {
  display:flex;
  justify-content:center;
  margin:30px 0;
}

/* FOOTER */
footer {
  background:#0b3d91;
  padding:30px;
  text-align:center;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>BBC Church</div>
  <div>
    <a href="#" style="color:white;">หน้าแรก</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">

  <div class="hero-text">
    <h1>นมัสการพระเจ้า</h1>
    <h1>ด้วยสุดใจ</h1>
    <p>สถานที่แห่งความรัก การอธิษฐาน และการเปลี่ยนแปลงชีวิต</p>
  </div>

</div>

<!-- 🙌 SECTION -->
<div class="section">
  <h2>บรรยากาศในคริสตจักร</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1515165562835-c3b8c2b1c5b2">
      <p>🙌 การยกมือสรรเสริญอย่างเต็มหัวใจ</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1529070538774-1843cb3265df">
      <p>🎤 การเทศนาและพระวจนะ</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429">
      <p>🕯️ บรรยากาศสงบ อธิษฐาน ใกล้ชิดพระเจ้า</p>
    </div>

  </div>
</div>

<!-- FLAG ใต้รูป -->
<div class="flag">
<img src="https://s01.flagcounter.com/count2/M2Js/bg_EEF277/txt_000000/border_CCCCCC/columns_8/maxflags_250/viewers_0/labels_1/pageviews_1/flags_0/percent_0/">
</div>

<!-- CONTACT -->
<div class="section">
  <h2>ติดต่อเรา</h2>
</div>

<!-- FLAG ก่อน footer -->
<div class="flag">
<img src="https://s01.flagcounter.com/count2/M2Js/bg_EEF277/txt_000000/border_CCCCCC/columns_8/maxflags_250/viewers_0/labels_1/pageviews_1/flags_0/percent_0/">
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Bangkhen Baptist Church</p>
</footer>

</body>
</html>
