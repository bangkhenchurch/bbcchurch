<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangkhen Baptist Church</title>
<link rel="icon" type="image/png" href="logo.png">

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #000;
  color: #fff;
  padding-top: 70px;
  overflow-x: hidden;
}

* { box-sizing: border-box; }

/* NAV */
nav {
  background: #0b3d91;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 999;
}

/* HERO */
.hero {
  min-height: 60vh;
  background: url('https://images.unsplash.com/photo-1507692049790-de58290a4334') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* SECTION */
.section {
  padding: 50px 20px;
  text-align: center;
}

/* FORM */
form {
  max-width: 500px;
  margin: auto;
  background: #111;
  padding: 20px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  background: #000;
  color: #fff;
  border: 1px solid #333;
}

button {
  width: 100%;
  padding: 10px;
  background: #0b3d91;
  color: white;
  border: none;
}

/* CHECKBOX */
.checkbox-group {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* POPUP */
#qrPopup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: #111;
  padding: 20px;
  position: relative;
}

#closePopup {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 25px;
  cursor: pointer;
}

/* FLOAT LINE */
#lineFloat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #06C755;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
}

/* FOOTER */
footer {
  background: #0b3d91;
  padding: 30px 10px;
  text-align: center;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>Bangkhen Baptist Church</div>
</nav>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>ยินดีต้อนรับ</h1>
  </div>
</div>

<!-- FLAG TOP -->
<div style="display:flex; justify-content:center; margin:20px 0;">
  <img src="https://s01.flagcounter.com/count2/M2Js/bg_EEF277/txt_000000/border_CCCCCC/columns_8/maxflags_250/viewers_0/labels_1/pageviews_1/flags_0/percent_0/">
</div>

<!-- LOGIN -->
<div style="max-width:400px;margin:30px auto;background:#111;padding:20px;border-radius:10px;">
<h2>Login สมาชิก</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<p id="status"></p>
</div>

<!-- CONTACT -->
<div class="section">
<h1>ผมอยากรู้จักพระเจ้า</h1>

<form id="contactForm">
<input name="fullname" placeholder="ชื่อ-นามสกุล">
<input name="phone" placeholder="โทรศัพท์">
<textarea name="address" placeholder="ที่อยู่"></textarea>

<button type="submit">ส่งข้อมูล</button>
</form>

<!-- LINE -->
<div style="margin-top:30px;">
<a href="https://lin.ee/60jBty7m">
<img src="line-qr.png" width="180">
</a>
</div>
</div>

<!-- 🔥 FLAG COUNTER (ก่อน FOOTER) -->
<div style="display:flex; justify-content:center; margin:20px 0;">
  <img src="https://s01.flagcounter.com/count2/M2Js/bg_EEF277/txt_000000/border_CCCCCC/columns_8/maxflags_250/viewers_0/labels_1/pageviews_1/flags_0/percent_0/">
</div>

<!-- FOOTER (ของคุณคืนครบ 100%) -->
<footer>
  <img src="logo.png" style="width:90px; margin-bottom:10px;">

  <h3 style="margin:5px 0;">
    @2026 Bangkhen Baptist Church คริสตจักรแบ๊บติสต์บางเขน
  </h3>

  <p>
    2172/145-147 ซอยพหลโยธิน 36 ถนนพหลโยธิน<br>
    แขวงลาดยาว เขตจตุจักร กรุงเทพฯ 10900
  </p>

  <p>โทร. 02-579-8764 (+662-5798764)</p>
</footer>

<!-- FLOAT BUTTON -->
<a id="lineFloat" href="#">💬</a>

<!-- POPUP -->
<div id="qrPopup">
  <div class="popup-box">
    <div id="closePopup">×</div>
    <img src="line-qr.png" width="200">
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* LOGIN */
function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(()=>status.innerText="สมัครสำเร็จ")
  .catch(e=>status.innerText=e.message);
}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(()=>status.innerText="Login สำเร็จ")
  .catch(e=>status.innerText=e.message);
}

/* FORM */
document.getElementById("contactForm").addEventListener("submit",(e)=>{
  e.preventDefault();
  alert("ส่งข้อมูลแล้ว");
});

/* POPUP */
const popup=document.getElementById("qrPopup");

document.getElementById("lineFloat").onclick=(e)=>{
  e.preventDefault();
  popup.style.display="flex";
};

document.getElementById("closePopup").onclick=()=>{
  popup.style.display="none";
};

</script>

</body>
</html>
