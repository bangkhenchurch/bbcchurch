<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>คริสต์จักรแบ๊บติสต์บางเขน</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌐 Language Switch -->
<div style="text-align:right; padding:10px;">
  <button onclick="setLang('th')">ไทย</button>
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('id')">ID</button>
  <button onclick="setLang('my')">MY</button>
</div>

<nav>
  <a href="index.html" data-lang="home"></a>
  <a href="about.html" data-lang="about"></a>
  <a href="schedule.html" data-lang="schedule"></a>
  <a href="news.html" data-lang="news"></a>
  <a href="contact.html" data-lang="contact"></a>
</nav>

<div class="container">
  <h1 data-lang="welcome"></h1>
  <p>คริสต์จักรแบ๊บติสต์บางเขน</p>

  <div class="card">
    <img src="images/logo church.jpg" alt="church" class="card-image">
    <h3 data-lang="word"></h3>
    <p data-lang="verse"></p>
  </div>
</div>

<footer>
  © 2026 BangKhen Baptist Church Website
</footer>

<script>
const texts = {
  th: {
    home: "หน้าแรก",
    about: "เกี่ยวกับเรา",
    schedule: "ตารางนมัสการ",
    news: "ข่าวสาร",
    contact: "ติดต่อ",
    welcome: "ยินดีต้อนรับ",
    word: "พระคำพระเจ้า",
    verse: '"พระเจ้าทรงเป็นความรัก"'
  },
  en: {
    home: "Home",
    about: "About Us",
    schedule: "Schedule",
    news: "News",
    contact: "Contact",
    welcome: "Welcome",
    word: "Word of God",
    verse: '"God is Love"'
  },
  id: {
    home: "Beranda",
    about: "Tentang Kami",
    schedule: "Jadwal",
    news: "Berita",
    contact: "Kontak",
    welcome: "Selamat Datang",
    word: "Firman Tuhan",
    verse: '"Tuhan adalah Kasih"'
  },
  my: {
    home: "ပင်မစာမျက်နှာ",
    about: "အကြောင်း",
    schedule: "အချိန်ဇယား",
    news: "သတင်း",
    contact: "ဆက်သွယ်ရန်",
    welcome: "ကြိုဆိုပါသည်",
    word: "ဘုရားသခင်၏ နှုတ်ကပတ်တော်",
    verse: '"ဘုရားသခင်သည် ချစ်ခြင်းမေတ္တာဖြစ်သည်"'
  }
};

function setLang(lang){
  localStorage.setItem("lang", lang);

  document.querySelectorAll("[data-lang]").forEach(el => {
    const key = el.getAttribute("data-lang");
    el.innerText = texts[lang][key];
  });
}

// โหลดภาษาอัตโนมัติ
window.onload = () => {
  const lang = localStorage.getItem("lang") || "th";
  setLang(lang);
};
</script>

</body>
</html>
