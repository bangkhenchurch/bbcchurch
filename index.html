ฃ<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บทความ</title>

<style>
body{font-family:sans-serif;background:#eef2f7;padding:20px;}
h1{color:#0a2c6d}

.box{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#2e7d32;
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
  width:100%;
  cursor:pointer;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

.star{
  color:gold;
  font-size:20px;
}
</style>
</head>

<body>

<h1>📝 สร้างบทความ</h1>

<div class="box">
<form id="postForm">

<input name="title" placeholder="หัวข้อบทความ" required>

<select name="category">
  <option>คำเทศนา</option>
  <option>ข่าว</option>
  <option>ข้อคิดพระคัมภีร์</option>
</select>

<input name="author" placeholder="ผู้เขียน">

<input type="file" id="image">

<textarea name="content" placeholder="เนื้อหา"></textarea>

<label>ให้คะแนน ⭐</label>
<select name="rating">
  <option value="1">1 ดาว</option>
  <option value="2">2 ดาว</option>
  <option value="3">3 ดาว</option>
  <option value="4">4 ดาว</option>
  <option value="5">5 ดาว</option>
</select>

<button>บันทึกบทความ</button>

</form>
</div>

<h1>📚 บทความทั้งหมด</h1>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, getDocs, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
 authDomain: "bbcchurch-6ffc3.firebaseapp.com",
 projectId: "bbcchurch-6ffc3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SAVE
document.getElementById("postForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const file = document.getElementById("image").files[0];
  let imageUrl = "";

  if(file){
    imageUrl = URL.createObjectURL(file); // demo
  }

  await addDoc(collection(db,"articles"),{
    title:e.target.title.value,
    category:e.target.category.value,
    author:e.target.author.value || "ไม่ระบุ",
    content:e.target.content.value,
    rating:parseInt(e.target.rating.value),
    image:imageUrl,
    createdAt:serverTimestamp()
  });

  alert("บันทึกสำเร็จ");

  e.target.reset(); // 🔥 เคลียร์ฟอร์ม
  load();
});

// LOAD
async function load(){
  const list=document.getElementById("list");
  list.innerHTML="";

  const q = query(collection(db,"articles"), orderBy("createdAt","desc"));
  const snap=await getDocs(q);

  snap.forEach(d=>{
    const data=d.data();

    let stars="⭐".repeat(data.rating || 0);

    let date = "";
    if(data.createdAt && data.createdAt.toDate){
      date = data.createdAt.toDate().toLocaleString("th-TH");
    }

    list.innerHTML+=`
    <div class="card">
      <h2>${data.title}</h2>
      <p>หมวดหมู่: ${data.category}</p>
      <p>ผู้เขียน: ${data.author}</p>
      <p>${date}</p>

      ${data.image ? `<img src="${data.image}">` : ""}

      <p>${data.content}</p>
      <div class="star">${stars}</div>
    </div>
    `;
  });
}

load();
</script>

</body>
</html>
